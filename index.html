{ n:2, track:'Core Track', title:'Intervals',
  blurb:'The distance between two notes — music\'s true atom',
  intro:'An interval is the gap between two notes. Scales, chords, and harmony are all just stacked intervals — so this is the most leveraged module in the course.',
  lessons:[
  { id:'m2l1', title:'What an Interval Is', mins:5, blocks:[
    {t:'p',x:'An <span class="term">interval</span> is simply the distance between two notes. It\'s <i>the</i> atom of music theory: a chord is a stack of intervals, a scale is a sequence of intervals, and harmony is intervals moving over time. Master intervals and the rest falls into place.'},
    {t:'p',x:'Every interval has two parts to its name: a <b>number</b> (how many letter-names it spans) and a <b>quality</b> (major, minor, perfect, etc.). For now, the shortcut that never lies is <b>counting half steps</b>.'},
    {t:'h',x:'The intervals within one octave'},
    {t:'p',x:'Here\'s the full set, from 0 to 12 half steps. Don\'t memorize — just notice the shape. The 3rds and 5ths (highlighted feel) are the workhorses of harmony; you\'ll meet them everywhere.'},
    {t:'ul',x:[
      '<b>m2</b> minor 2nd · 1 half step','<b>M2</b> major 2nd · 2',
      '<b>m3</b> minor 3rd · 3 &nbsp;— sad/soft color','<b>M3</b> major 3rd · 4 &nbsp;— bright/happy color',
      '<b>P4</b> perfect 4th · 5','<b>TT</b> tritone · 6 &nbsp;— the restless one',
      '<b>P5</b> perfect 5th · 7 &nbsp;— hollow, rock-solid','<b>m6</b> minor 6th · 8 · <b>M6</b> major 6th · 9',
      '<b>m7</b> minor 7th · 10 · <b>M7</b> major 7th · 11','<b>P8</b> octave · 12'
    ]},
    {t:'widget',label:'Build any interval',build:()=>intervalBuilder(),
      hint:'Pick a root and an interval; the clock draws the shape and you hear both notes played apart, then together. The major 3rd vs minor 3rd contrast is the single most important sound in this course — compare them.'},
    {t:'note',x:'<b>The major/minor split.</b> Notice M3 (4 half steps) sounds bright and happy, while m3 (3 half steps) sounds darker and sadder. One half step of difference flips the entire mood. That one notch is what separates a major chord from a minor chord.'},
  ]},
  { id:'m2l2', title:'Consonance & Dissonance', mins:5, blocks:[
    {t:'p',x:'Some pairs of notes sound sweet and restful; others sound tense and want to move. This is the <span class="term">consonance–dissonance</span> spectrum, and it\'s the engine behind tension and release — the thing that makes music feel like it\'s <i>going somewhere</i>.'},
    {t:'p',x:'Roughly: octaves and 5ths are the most stable (almost hollow). 3rds and 6ths are sweet and warm. 2nds, 7ths, and the tritone are tense. None are "bad" — dissonance is the fuel; consonance is the resolution.'},
    {t:'widget',label:'The spectrum — play and feel each',build:()=>consonanceLab(),
      hint:'Work down the list. The top ones fuse and rest; the bottom ones grind and pull. Trust your ear — you already know these feelings from playing.'},
    {t:'h',x:'Why — a little physics'},
    {t:'p',x:'Consonance isn\'t arbitrary or cultural taste. It comes from <b>frequency ratios</b>. When two notes\' frequencies form a simple ratio, their waves line up often and the sound fuses. Complicated ratios mean the waves rarely align, producing the rough "beating" we hear as tension.'},
    {t:'widget',label:'Ratios behind the feeling',build:()=>ratioDemo(),
      hint:'The octave is 2:1 — perfectly stable. The 5th is 3:2 — nearly as stable. The minor 2nd is 16:15 — those big numbers are why it grinds.'},
    {t:'note',k:'phys',x:'<b>This is genuinely physical.</b> Pluck a string and it also vibrates in halves, thirds, quarters — the <i>overtone series</i>. The octave (½), fifth (⅓), and major third (⅕) are literally present inside every single note you play. Consonant intervals are the ones already hiding in the sound. That\'s why they feel like home.'},
  ]},
  { id:'m2l3', title:'Using Intervals to Hear', mins:4, blocks:[
    {t:'p',x:'The payoff: once you can name intervals, you can explain <i>why</i> any two notes sound the way they do together — and start hearing them in the wild. This is also the foundation of ear training.'},
    {t:'p',x:'A classic trick is to anchor each interval to a song you know. The first two notes of a familiar tune lock the sound into memory:'},
    {t:'ul',x:[
      '<b>Perfect 5th</b> (7) — opening of "Twinkle Twinkle" / Star Wars theme. Hollow, heroic.',
      '<b>Major 3rd</b> (4) — opening of "When the Saints Go Marching In". Bright.',
      '<b>Minor 3rd</b> (3) — "Greensleeves" / "Hey Jude" (last two notes of the title). Wistful.',
      '<b>Perfect 4th</b> (5) — "Here Comes the Bride". Strong, ceremonial.',
      '<b>Octave</b> (12) — "Somewhere" from West Side Story ("Some-where"). A leap to the same note.',
      '<b>Tritone</b> (6) — "The Simpsons" theme ("The Simp-"). Unstable, cartoonish.'
    ]},
    {t:'widget',label:'Test your anchors — build and replay any interval',build:()=>intervalBuilder(),
      hint:'Set the interval, play it, and hum the song it reminds you of. Do this often and naming-by-ear becomes automatic.'},
    {t:'note',x:'<b>Inversion bonus.</b> Flip an interval (move the lower note up an octave) and it "completes" to 12. A 5th (7) inverts to a 4th (5): 7+5=12. A major 3rd (4) inverts to a minor 6th (8). Useful shortcut: learn half the intervals and you get the rest for free.'},
  ]},
  { id:'m2q', title:'Module 2 Quiz', mins:6, quiz:{ questions:[
    {q:'How many half steps are in a Perfect 5th?',
     options:['5','6','7','8'], answer:2, why:'A perfect 5th = 7 half steps. C up to G.'},
    {q:'What\'s the difference between a major 3rd and a minor 3rd?',
     options:['One half step — major is bigger and brighter','A whole octave','Nothing, they\'re the same','The major 3rd is lower'],
     answer:0, why:'M3 = 4 half steps (bright), m3 = 3 (darker). That single half step flips a chord between happy and sad.'},
    {q:'Which interval is the MOST consonant (most stable)?',
     options:['Minor 2nd','Tritone','Octave','Major 7th'], answer:2,
     why:'The octave, ratio 2:1, is the most consonant interval — so stable it sounds like the same note.'},
    {q:'Consonance comes mainly from…',
     options:['Simple frequency ratios','The color of the instrument','How loud the notes are','Cultural habit alone'],
     answer:0, why:'Simple ratios (2:1, 3:2, 5:4) make waves align and fuse. They\'re also present in the natural overtone series.'},
    {q:'A Perfect 5th (7 half steps) inverted becomes…',
     options:['Another 5th','A Perfect 4th (5)','A major 3rd (4)','An octave'], answer:1,
     why:'Inversions sum to 12: 7 + 5 = 12, so a 5th inverts to a 4th.'},
    {q:'Listen — name this interval.', sub:'Played low then high. Tap play.',
     build:()=>earQ(()=>Audio_.interval(60,67,0.7,0.6)),
     options:['Minor 2nd','Major 3rd','Perfect 5th','Octave'], answer:2,
     why:'That was C→G, a perfect 5th — that hollow, open, "Star Wars" sound.'},
    {q:'Listen — bright or dark? Name it.', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.interval(60,63,0.7,0.6)),
     options:['Major 3rd (bright)','Minor 3rd (dark)','Perfect 4th','Tritone'], answer:1,
     why:'That was C→E♭, a minor 3rd — the darker, more wistful of the two thirds.'},
    {q:'Listen — this tense, restless interval is the…', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.interval(60,66,0.7,0.6)),
     options:['Octave','Perfect 5th','Tritone','Major 2nd'], answer:2,
     why:'That was the tritone (6 half steps) — maximally unstable, the "Simpsons" leap. It badly wants to resolve.'},
  ]}},
]},

/* ---------- MODULE 3 ---------- */
{ n:3, track:'Core Track', title:'Scales & Keys',
  blurb:'Recipes of steps, and the gravity of a key',
  intro:'A scale is a fixed pattern of whole and half steps. A key is the gravitational field a piece lives in. Same pattern, any starting note — that\'s every key there is.',
  lessons:[
  { id:'m3l1', title:'The Major Scale', mins:5, blocks:[
    {t:'p',x:'A <span class="term">scale</span> is a recipe: a fixed pattern of whole and half steps that you can start on any note. The most important one is the <b>major scale</b> — the "do re mi fa sol la ti do" you already know in your bones.'},
    {t:'p',x:'Its pattern, in whole (W) and half (H) steps, is:'},
    {t:'note',x:'<b style="color:var(--accent2);font-size:1.05rem;letter-spacing:1px;">W – W – H – W – W – W – H</b><br>Start on any note, follow that exact sequence of steps, and you\'ve built a major scale. The two half steps (after the 3rd note and after the 7th) are what give it that bright, resolved, "coming home" sound.'},
    {t:'p',x:'Start on C and follow the recipe and you get <b>C D E F G A B C</b> — all white keys, no sharps or flats. That\'s not a coincidence: the white keys <i>are</i> C major. The uneven spacing you learned in Module 1 (those E–F and B–C half steps) is precisely the W-W-H-W-W-W-H pattern.'},
    {t:'widget',label:'Build & hear any major scale',build:()=>scaleBuilder('major'),
      hint:'Keep it on Major and change the root. The shape on the clock stays identical — it just rotates. That rotating shape IS the scale; the starting note just names the key.'},
    {t:'note',k:'code',x:'// Procedural lens: a scale is a step-pattern.\n// major = [2,2,1,2,2,2,1]  (half steps)\n// notes = scan-add from root, mod 12.\n// Rotating the start note = transposing to a new key.'},
  ]},
  { id:'m3l2', title:'Minor Scales', mins:5, blocks:[
    {t:'p',x:'If major is bright, <span class="term">minor</span> is its shadow — darker, more serious or melancholy. The key difference is a <b>flatter 3rd</b> (that major-vs-minor 3rd from Module 2, now built into the whole scale).'},
    {t:'p',x:'There are three minor scales. They share the same first five notes and differ only near the top:'},
    {t:'ul',x:[
      '<b>Natural minor</b> — W H W W H W W. The pure, plain minor sound. (It\'s also the white keys starting from A.)',
      '<b>Harmonic minor</b> — raises the 7th note, creating a strong pull back to the root (and an exotic gap near the top).',
      '<b>Melodic minor</b> — raises the 6th and 7th going up, for a smoother climb; often reverts to natural coming down.'
    ]},
    {t:'widget',label:'Compare the minor scales',build:()=>scaleBuilder('natminor'),
      hint:'Switch between the three minor types on the same root and listen to the top of each. Harmonic minor\'s raised 7th gives that dramatic, almost Spanish flavour.'},
    {t:'note',x:'<b>Relative vs parallel.</b> A minor and C major use the exact same notes — they\'re <i>relative</i> (same notes, different home base). A minor and A major start on the same note but differ — they\'re <i>parallel</i>. Both relationships become powerful tools later for borrowing color between scales.'},
    {t:'note',k:'phys',x:'<b>Why the three minors exist.</b> Natural minor sounds great melodically but its 7th note sits a whole step below the root, so it doesn\'t "pull home" strongly. Harmonic minor raises that 7th to fix the harmony; melodic minor also raises the 6th to smooth out the awkward gap that creates. They\'re practical fixes, not arbitrary variants.'},
  ]},
  { id:'m3l3', title:'Keys & the Circle of Fifths', mins:6, blocks:[
    {t:'p',x:'A <span class="term">key</span> is the gravitational field a piece lives in: one note (the <b>tonic</b>) feels like home, and the scale built on it supplies the notes that belong. "In the key of G major" means G is home and you\'re drawing from the G major scale.'},
    {t:'p',x:'Because each major scale has a fixed pattern, each key needs a specific set of sharps or flats to keep that pattern intact. That fixed set is the <span class="term">key signature</span>. C major needs none. G major needs exactly one sharp (F♯). Add it and G\'s scale follows W-W-H-W-W-W-H perfectly; leave it out and the pattern breaks.'},
    {t:'widget',label:'The Circle of Fifths',build:()=>circleOfFifths(),
      hint:'Moving clockwise, each key is a perfect 5th up and adds one sharp. Counter-clockwise adds flats. Neighbours share almost all their notes — which is why they sound related and why music modulates between them.'},
    {t:'p',x:'The circle is the master map of keys. Two ideas make it click: <b>(1)</b> each step clockwise jumps up a 5th and adds one sharp (C→G→D→A…); <b>(2)</b> keys near each other on the circle share most of their notes, so moving between them sounds smooth. Distant keys (across the circle) share few notes and sound like a dramatic shift.'},
    {t:'note',x:'<b>Why "fifths"?</b> Stacking perfect 5ths (the second-most consonant interval) is the most efficient way to tour all 12 notes — go up a 5th twelve times and you hit every note before returning home. The circle is literally that journey drawn as a clock. It\'s the same deep fact that makes 5ths sound so stable, now organizing every key in music.'},
    {t:'p',x:'You don\'t need to memorize all of this now. The takeaway: keys aren\'t a random list — they\'re a connected map, and closeness on the circle equals similarity in sound. We\'ll use it constantly once we start moving between chords and keys.'},
  ]},
  { id:'m3q', title:'Module 3 Quiz', mins:6, quiz:{ questions:[
    {q:'What is the step pattern of the major scale?',
     options:['W W W H W W H','W H W W H W W','W W H W W W H','H W W H W W W'], answer:2,
     why:'W-W-H-W-W-W-H. The two half steps (after the 3rd and 7th notes) give major its bright, resolved sound.'},
    {q:'Which key has no sharps or flats?',
     options:['G major','C major','F major','D major'], answer:1,
     why:'C major is all white keys — its scale already matches W-W-H-W-W-W-H with no accidentals.'},
    {q:'A minor and C major contain the same notes. They are called…',
     options:['Parallel keys','Relative keys','Enharmonic keys','Identical keys'], answer:1,
     why:'Same notes, different tonic = relative keys. (Same tonic, different notes would be parallel.)'},
    {q:'On the circle of fifths, moving one step clockwise…',
     options:['Adds one flat','Adds one sharp','Changes nothing','Jumps an octave'], answer:1,
     why:'Clockwise = up a perfect 5th = add one sharp (C→G→D…). Counter-clockwise adds flats.'},
    {q:'What mainly separates a minor scale from a major scale?',
     options:['A flatter (lowered) 3rd','A higher tonic','More notes overall','A faster tempo'], answer:0,
     why:'The lowered 3rd is the core of the minor sound — the same M3-vs-m3 contrast from Module 2, built into the scale.'},
    {q:'Listen — is this scale major or minor?', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.seq(buildScale(60,'major'),0.34,0.34)),
     options:['Major','Minor'], answer:0,
     why:'That was C major ascending — bright and resolved, ending with a satisfying "arrival" at the octave.'},
    {q:'Listen — major or minor?', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.seq(buildScale(60,'natminor'),0.34,0.34)),
     options:['Major','Minor'], answer:1,
     why:'That was C natural minor — the lowered 3rd, 6th and 7th give it that darker, more serious color.'},
    {q:'Listen — which minor scale is this? (Note the dramatic gap near the top.)', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.seq(buildScale(60,'harmonicminor'),0.34,0.34)),
     options:['Natural minor','Harmonic minor','Melodic minor','Major'], answer:1,
     why:'Harmonic minor — the raised 7th creates that big, exotic leap near the top and a strong pull home.'},
  ]}},
]},

/* ---------- MODULE 4 ---------- */
{ n:4, track:'Core Track', title:'Chord Construction',
  blurb:'Stacking intervals into triads and beyond',
  intro:'A chord is intervals stacked from a scale. Learn the four triads and the 7th chords, and you can build or name almost any chord you meet.',
  lessons:[
  { id:'m4l1', title:'Triads — the Four Flavors', mins:5, blocks:[
    {t:'p',x:'A <span class="term">triad</span> is a three-note chord built by stacking two 3rds. Take a root, skip up a 3rd, skip up another 3rd. Which <i>kind</i> of 3rd you stack (major = 4 half steps, minor = 3) decides the chord\'s entire personality — exactly the major/minor 3rd you met in Module 2.'},
    {t:'p',x:'There are four ways to combine those two thirds, giving the four triad types:'},
    {t:'ul',x:[
      '<b>Major</b> = major 3rd + minor 3rd (root, +4, +7). Bright, happy, resolved.',
      '<b>Minor</b> = minor 3rd + major 3rd (root, +3, +7). Dark, sad, serious.',
      '<b>Diminished</b> = minor 3rd + minor 3rd (root, +3, +6). Tense, unstable, anxious.',
      '<b>Augmented</b> = major 3rd + major 3rd (root, +4, +8). Strange, dreamlike, suspended.'
    ]},
    {t:'note',x:'<b>The whole game is the 3rd.</b> Major and minor triads share the same root and 5th — only the middle note moves by one half step. That single note is the difference between joy and sorrow in music. Everything else is coloring on top.'},
    {t:'widget',label:'Build any chord',build:()=>chordBuilder(),
      hint:'Start by flipping between Major and Minor on the same root — listen to that one note move. Then try Diminished (notice the unease) and Augmented (notice it can\'t sit still).'},
    {t:'note',k:'code',x:'// Procedural lens: a chord is a set of offsets from a root.\n// major = [0,4,7]   minor = [0,3,7]\n// dim   = [0,3,6]   aug   = [0,4,8]\n// Transpose = add the root midi number to every offset.'},
  ]},
  { id:'m4l2', title:'7th Chords & Extensions', mins:5, blocks:[
    {t:'p',x:'Keep stacking 3rds past the triad and you add <b>color</b>. Add one more 3rd on top of a triad and you get a <span class="term">7th chord</span> — four notes, a richer and more sophisticated sound. These are the backbone of jazz, soul, and most film music.'},
    {t:'ul',x:[
      '<b>Major 7th</b> (maj7) — lush, dreamy, warm. A major triad + a major 7th on top.',
      '<b>Minor 7th</b> (m7) — smooth, mellow, jazzy. A minor triad + a minor 7th.',
      '<b>Dominant 7th</b> (7) — bluesy and <i>restless</i>; it badly wants to resolve. A major triad + a minor 7th. This is the engine of tension in harmony.'
    ]},
    {t:'widget',label:'Hear the 7th chords',build:()=>chordBuilder(),
      hint:'Switch to maj7, m7, and dom7 on C. The dominant 7th is special — it contains a hidden tritone (from Module 2) that creates its hunger to move.'},
    {t:'h',x:'Extensions: 9ths, 11ths, 13ths'},
    {t:'p',x:'Keep going past the 7th — stacking still more 3rds — and you reach the <span class="term">extensions</span>: the 9th, 11th, and 13th. They don\'t change a chord\'s basic function; they\'re added spice — the "wider" lush sound of a Stevie Wonder or Steely Dan chord. You rarely play all of them at once; you pick the colors you want.'},
    {t:'note',x:'<b>Why odd numbers?</b> 1, 3, 5, 7, 9, 11, 13 — chords are built in 3rds, so you skip every other scale degree. A 9th is just the 2nd up an octave; an 11th is the 4th; a 13th is the 6th. Same notes you know, lifted into a higher, sweeter register.'},
    {t:'note',k:'phys',x:'<b>The dominant 7th\'s secret.</b> In a C7 chord (C–E–G–B♭), the E and B♭ are a tritone apart — the most unstable interval there is. The ear hears that tension and demands release, which is why a dominant 7th pulls so strongly toward its home chord. Tension is built right into the stack.'},
  ]},
  { id:'m4q', title:'Module 4 Quiz', mins:6, quiz:{ questions:[
    {q:'A major triad is built from the root by stacking…',
     options:['Two minor 3rds','A major 3rd then a minor 3rd','A minor 3rd then a major 3rd','Two major 3rds'], answer:1,
     why:'Major = major 3rd (+4) then minor 3rd (+7 total). Minor flips the order; that one inner note is the whole difference.'},
    {q:'Which triad is built from two stacked minor 3rds (root, +3, +6)?',
     options:['Major','Minor','Diminished','Augmented'], answer:2,
     why:'Diminished = two minor 3rds — tense and unstable, with a tritone between root and top.'},
    {q:'What separates a major triad from a minor triad?',
     options:['The root note','The 5th','Just the middle note (the 3rd), by one half step','The number of notes'], answer:2,
     why:'They share root and 5th; only the 3rd differs by a half step. That single note flips happy to sad.'},
    {q:'A dominant 7th chord (e.g. C7) is restless because it contains…',
     options:['Two perfect 5ths','A hidden tritone','Only consonant intervals','An octave'], answer:1,
     why:'The 3rd and ♭7 form a tritone — maximally unstable, so the chord pulls hard toward resolution.'},
    {q:'A 9th, 11th, or 13th added to a chord is…',
     options:['A completely new root','Added color/extension, built by stacking more 3rds','A rhythm marking','The same as an inversion'], answer:1,
     why:'Extensions keep stacking 3rds (the 2nd, 4th, 6th lifted an octave) for a wider, richer color.'},
    {q:'Listen — major or minor triad?', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.arpThenBlock(buildChord(60,'maj'))),
     options:['Major','Minor'], answer:0, why:'C major triad — bright and resolved.'},
    {q:'Listen — which triad? (Notice the unstable, anxious quality.)', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.arpThenBlock(buildChord(60,'dim'))),
     options:['Major','Minor','Diminished','Augmented'], answer:2,
     why:'Diminished — two minor 3rds give that tense, unresolved sound that wants to move.'},
    {q:'Listen — this lush four-note chord is a…', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.arpThenBlock(buildChord(60,'maj7'))),
     options:['Major triad','Major 7th','Diminished triad','Augmented triad'], answer:1,
     why:'Major 7th (Cmaj7) — that warm, dreamy, slightly jazzy color from the major 7th on top.'},
  ]}},
]},

/* ---------- MODULE 5 ---------- */
{ n:5, track:'Core Track', title:'Diatonic Harmony',
  blurb:'The chords that belong to a key',
  intro:'Build a chord on every note of a scale and you get the family of chords that naturally belong to that key. The Roman-numeral system makes this family portable to any key.',
  lessons:[
  { id:'m5l1', title:'Chords From the Scale', mins:5, blocks:[
    {t:'p',x:'Here\'s where scales and chords meet. Take a major scale and build a triad on <i>each</i> of its seven notes — using only notes from that scale. You get seven chords, and together they are the <span class="term">diatonic</span> chords: the home family of that key.'},
    {t:'p',x:'In C major (all white keys), stacking 3rds on each degree gives: C, Dm, Em, F, G, Am, B°. Notice you didn\'t choose those qualities — they fell out automatically from the scale\'s uneven spacing.'},
    {t:'widget',label:'The chord family of C major',build:()=>diatonicExplorer('major'),
      hint:'Tap each chord, then play all seven up the scale. The pattern of major/minor/diminished is the fingerprint of every major key.'},
    {t:'note',x:'<b>The quality pattern (major key):</b> <b>major, minor, minor, major, major, minor, diminished.</b> This never changes. Learn it once and you instantly know the chords of any major key — just apply it to that key\'s scale.'},
    {t:'p',x:'Minor keys have their own fixed pattern. Build triads on the natural minor scale and you get: minor, diminished, major, minor, minor, major, major. Same idea, different fingerprint — which is why major and minor keys <i>feel</i> structurally different.'},
  ]},
  { id:'m5l2', title:'Roman Numerals', mins:5, blocks:[
    {t:'p',x:'Musicians label these seven chords by their <i>position</i> in the scale using Roman numerals, not by letter name. This is one of the most powerful ideas in theory.'},
    {t:'note',x:'<b style="letter-spacing:1px;color:var(--accent2)">I &nbsp; ii &nbsp; iii &nbsp; IV &nbsp; V &nbsp; vi &nbsp; vii°</b><br>Capitals = major, lowercase = minor, ° = diminished. In any major key, the chord built on the 1st degree is "I", on the 5th degree is "V", and so on.'},
    {t:'p',x:'Why bother? Because it makes keys <b>interchangeable</b>. "I–IV–V" is the same musical idea whether you\'re in C (C–F–G) or in E (E–A–B). The numerals describe the <i>relationships</i> between chords, which is what actually creates the music — the specific letters are just a transposition detail.'},
    {t:'widget',label:'See the numerals in action',build:()=>diatonicExplorer('major'),
      hint:'Each button shows the Roman numeral and the actual C-major chord. The numeral is the portable idea; the letter is just where it lands in this key.'},
    {t:'note',x:'<b>This is the language of the rest of the course.</b> From here on we\'ll talk about progressions as "I–V–vi–IV" rather than naming chords. Once it clicks, you can transpose any song to any key in your head, and you\'ll see the same handful of patterns everywhere.'},
    {t:'note',k:'code',x:'// Procedural lens: diatonic chords = scan the scale,\n// take every 3rd note (degree, degree+2, degree+4).\n// The quality pattern emerges from the scale\'s step sizes\n// — no special-casing needed.'},
  ]},
  { id:'m5q', title:'Module 5 Quiz', mins:6, quiz:{ questions:[
    {q:'The diatonic chords of a key are…',
     options:['Any chords you like','The chords built on each scale degree using only that scale\'s notes','Only major chords','The same in every key by letter'], answer:1,
     why:'Build a triad on each scale note using only scale notes — that\'s the key\'s home chord family.'},
    {q:'The quality pattern of a MAJOR key is…',
     options:['maj min min maj maj min dim','min maj maj min min maj dim','maj maj maj min min min dim','all major'], answer:0,
     why:'I ii iii IV V vi vii° = major, minor, minor, major, major, minor, diminished. Fixed in every major key.'},
    {q:'In Roman numeral analysis, a lowercase numeral (e.g. "ii") means…',
     options:['A major chord','A minor chord','A diminished chord','The loudest chord'], answer:1,
     why:'Lowercase = minor, uppercase = major, ° = diminished.'},
    {q:'The main advantage of Roman numerals is that they…',
     options:['Sound better','Make progressions portable to any key','Are easier to write','Only work in C'], answer:1,
     why:'I–IV–V is the same idea in every key; numerals capture the relationships, not the specific letters.'},
    {q:'In the key of G major, what chord is "V"?',
     options:['G','C','D','Em'], answer:2,
     why:'The 5th degree of G major is D, so V = D major. (G A B C D…)'},
    {q:'The chord built on the 7th degree of a major scale (vii°) is…',
     options:['Major','Minor','Diminished','Augmented'], answer:2,
     why:'vii° is diminished — the lone diminished triad in the major-key family.'},
    {q:'Listen — these are the 7 diatonic chords of a key, played up the scale. The key is…', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.progression(MAJ_DIATONIC.map((d,i)=>diatonicTriad(60,'major',i)),0.6,0.55)),
     options:['Major','Minor'], answer:0,
     why:'That bright, resolved family climbing up is the major-key set (I ii iii IV V vi vii°).'},
  ]}},
]},

/* ---------- MODULE 6 ---------- */
{ n:6, track:'Core Track', title:'Chord Progressions & Function',
  blurb:'Why chords move — tension and resolution',
  intro:'The heart of harmony. Chords aren\'t random — each has a job (a function), and progressions work by building tension and releasing it. This is why music feels like it\'s going somewhere.',
  lessons:[
  { id:'m6l1', title:'The Three Functions', mins:5, blocks:[
    {t:'p',x:'Every diatonic chord plays one of three roles in the drama of a key. Think of it as a journey: leaving home, traveling, and the pull to return.'},
    {t:'ul',x:[
      '<b>Tonic (home)</b> — I (and vi, iii). Rest, stability, arrival. Where the music wants to end up.',
      '<b>Subdominant (away)</b> — IV (and ii). Motion, departure — we\'ve left home but there\'s no crisis yet.',
      '<b>Dominant (tension)</b> — V (and vii°). Maximum tension, an itch that <i>demands</i> resolution back to the tonic.'
    ]},
    {t:'p',x:'A satisfying progression is a trip through these functions: <b>tonic → subdominant → dominant → tonic</b>. Home, away, tension, home. That arc is underneath an astonishing amount of music.'},
    {t:'h',x:'The pull of V → I'},
    {t:'p',x:'The strongest force in tonal music is the dominant resolving to the tonic — <b>V → I</b>. The V chord contains the <span class="term">leading tone</span> (the 7th scale degree), which sits just a half step below home and aches to slide up to it. Add a 7th (making it V7) and you get a tritone too, doubling the pull.'},
    {t:'widget',label:'Feel the functions',build:()=>progressionPlayer(),
      hint:'Play I–IV–V–I and notice the shape: settled, then moving, then tense, then the relief of coming home. Every other progression here is a variation on that emotional arc.'},
    {t:'note',k:'phys',x:'<b>Why V pulls so hard.</b> In C major, the V chord (G–B–D) contains B — the leading tone, one half step below C. Half-step motion is the strongest melodic pull there is (Module 1). Your ear hears B and wants C the way a held breath wants release.'},
  ]},
  { id:'m6l2', title:'Cadences & Common Progressions', mins:5, blocks:[
    {t:'p',x:'A <span class="term">cadence</span> is how a musical phrase ends — the punctuation of music. Just as sentences end with periods, commas, or cliffhangers, phrases end with different cadences that signal "done", "pause", or "more coming".'},
    {t:'widget',label:'The four cadences',build:()=>cadenceLab(),
      hint:'Authentic (V–I) is a full stop. Plagal (IV–I) is the gentle "Amen". Half (ending on V) is a comma that leaves you hanging. Deceptive (V–vi) fakes the ending — the surprise that keeps a song going.'},
    {t:'h',x:'Progressions that recur everywhere'},
    {t:'p',x:'A handful of progressions show up across pop, rock, jazz, classical and folk — not by copying, but because they trace that tonic–subdominant–dominant arc so cleanly. Learn these and you\'ll recognize the skeleton of thousands of songs.'},
    {t:'widget',label:'The greatest hits',build:()=>progressionPlayer(),
      hint:'I–V–vi–IV alone underlies hundreds of pop songs. ii–V–I is the heartbeat of jazz. Play each and listen for where the tension sits and how it releases.'},
    {t:'note',x:'<b>Why these and not others?</b> Strong progressions move by descending 5ths (V→I, ii→V) or step into the tonic — motions the ear finds inevitable. Weak or "backward" moves (like V→IV) feel like swimming upstream. Function explains <i>why</i> some chord moves feel right and others feel off.'},
  ]},
  { id:'m6q', title:'Module 6 Quiz', mins:6, quiz:{ questions:[
    {q:'The three harmonic functions are…',
     options:['Loud, medium, soft','Tonic, subdominant, dominant','Major, minor, diminished','Verse, chorus, bridge'], answer:1,
     why:'Tonic (home), subdominant (away), dominant (tension) — the three roles every chord plays.'},
    {q:'Which chord creates the strongest pull back to the tonic?',
     options:['IV','ii','V','vi'], answer:2,
     why:'V (the dominant) contains the leading tone a half step below home, creating the strongest pull to I.'},
    {q:'An authentic cadence is…',
     options:['IV → I','V → I','I → V','V → vi'], answer:1,
     why:'V → I is the authentic cadence — the strongest, most conclusive "full stop".'},
    {q:'A deceptive cadence (V → vi) works by…',
     options:['Resolving as expected','Setting up the tonic then landing on the minor vi instead','Ending on silence','Going to the subdominant'], answer:1,
     why:'V sets up an expected I, but lands on vi instead — a satisfying surprise that keeps things moving.'},
    {q:'The "leading tone" that gives V its pull is…',
     options:['A whole step above the tonic','A half step below the tonic','The 5th of the scale','The same as the root'], answer:1,
     why:'The leading tone sits a half step below the tonic and aches to resolve up to it.'},
    {q:'The typical tension arc of a progression is…',
     options:['tonic → dominant → subdominant → tonic','tonic → subdominant → dominant → tonic','dominant → tonic → dominant','random'], answer:1,
     why:'Home → away → tension → home. The classic, satisfying journey through the functions.'},
    {q:'Listen — which cadence is this? (A strong, conclusive ending.)', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.progression([diatonicTriad(60,'major',4),diatonicTriad(60,'major',0)],0.95,0.9)),
     options:['Plagal (IV–I)','Authentic (V–I)','Half (I–V)','Deceptive (V–vi)'], answer:1,
     why:'V–I, the authentic cadence — that decisive "we have arrived" sound.'},
    {q:'Listen — this gentle "Amen"-style ending is the…', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.progression([diatonicTriad(60,'major',3),diatonicTriad(60,'major',0)],0.95,0.9)),
     options:['Authentic (V–I)','Plagal (IV–I)','Half (I–V)','Deceptive (V–vi)'], answer:1,
     why:'IV–I, the plagal or "Amen" cadence — softer and gentler than the authentic.'},
  ]}},
]},

/* ---------- MODULE 7 ---------- */
{ n:7, track:'Core Track', title:'Voice Leading & Building Harmony',
  blurb:'Making a progression flow, not lurch',
  intro:'A chord progression is a skeleton. Voice leading is how you connect the chords smoothly — moving each note the shortest distance — so the harmony flows like water instead of jumping around.',
  lessons:[
  { id:'m7l1', title:'Inversions & the Bass Line', mins:5, blocks:[
    {t:'p',x:'A chord\'s notes can be stacked in any order. When a note other than the root sits at the bottom, the chord is in an <span class="term">inversion</span>. The notes are the same — it\'s still a C chord — but the <b>bass note</b> changes its weight and feel.'},
    {t:'widget',label:'Three voicings of one chord',build:()=>inversionDemo(),
      hint:'Root position feels grounded; inversions feel lighter and more mobile. Same chord, different center of gravity.'},
    {t:'p',x:'Inversions exist mostly to serve the <b>bass line</b> — the lowest voice, which is a melody in its own right. By choosing inversions, you can make the bass walk smoothly by step instead of leaping around. A smooth bass line is half of what makes harmony sound professional.'},
    {t:'note',x:'<b>Slash chords.</b> You\'ll see notation like "C/E" — that means a C chord with E in the bass (first inversion). The part after the slash is just which note to put on the bottom. It\'s how musicians write inversions quickly.'},
  ]},
  { id:'m7l2', title:'Smooth Voice Leading', mins:6, blocks:[
    {t:'p',x:'Here\'s the core principle, and it\'s almost a law: <b>when moving from one chord to the next, move each voice as little as possible.</b> Keep common notes where they are, and move the rest by a step. The result is smooth, connected, and singable.'},
    {t:'widget',label:'Same chords, two ways',build:()=>voiceLeadingDemo(),
      hint:'Both play C–G–Am–F. The "jumpy" version slams each chord in root position; the "smooth" version barely moves the inner notes. Same harmony — utterly different polish.'},
    {t:'p',x:'Two practical habits do most of the work: <b>(1) Common-tone retention</b> — if two adjacent chords share a note, keep it in the same voice. <b>(2) Nearest-note motion</b> — move the other voices to the closest available chord tone. Together they minimize total movement.'},
    {t:'h',x:'Adding color tones tastefully'},
    {t:'p',x:'Once the motion is smooth, you can enrich chords with the color tones from Module 4 — 7ths, 9ths, suspensions. A <span class="term">suspension</span> holds a note from the previous chord that clashes slightly, then resolves down by step — a tiny moment of tension and release inside a single chord change. Used sparingly, color tones add sophistication; overused, they turn to mud.'},
    {t:'note',k:'code',x:'// Procedural lens: voice leading is an optimization.\n// For each chord change, assign new-chord notes to voices\n// to MINIMIZE total semitone movement (a min-cost matching).\n// "Good harmony" literally is a distance-minimization problem.'},
  ]},
  { id:'m7q', title:'Module 7 Quiz', mins:5, quiz:{ questions:[
    {q:'A chord inversion is…',
     options:['A different chord','The same chord with a non-root note in the bass','A chord played backwards','A faster chord'], answer:1,
     why:'Same notes, different bass note. C/E is a C chord with E on the bottom.'},
    {q:'The core principle of voice leading is…',
     options:['Move every note as far as possible','Move each voice as little as possible','Always use root position','Play louder'], answer:1,
     why:'Minimal motion — keep common tones, move the rest by the smallest step — makes harmony flow.'},
    {q:'"Common-tone retention" means…',
     options:['Repeating the same chord','Keeping a shared note in the same voice between chords','Removing the 5th','Doubling the root'], answer:1,
     why:'If two chords share a note, hold it in place — that anchor smooths the change.'},
    {q:'Inversions are chosen mainly to…',
     options:['Make chords louder','Create a smooth bass line','Change the key','Add more notes'], answer:1,
     why:'Inversions let the bass move by step instead of leaping — a smooth bass line sounds professional.'},
    {q:'A suspension is…',
     options:['A held note that clashes briefly then resolves down by step','A silent beat','A key change','A type of cadence'], answer:0,
     why:'A suspension holds a note into the next chord (slight tension), then steps down to resolve — tension and release within one change.'},
    {q:'Listen — which version has smoother voice leading?', sub:'You\'ll hear two takes of C–G–Am–F: first jumpy, then smooth.',
     build:()=>el('div','whint','(Use the widget above to compare — then answer.)'),
     options:['The one where chords leap around','The one where inner notes barely move','They\'re identical','Neither'], answer:1,
     why:'Smaller motion between chords = smoother voice leading, even though the chords are the same.'},
  ]}},
]},

/* ---------- MODULE 8 ---------- */
{ n:8, track:'Core Track', title:'Melody',
  blurb:'Writing and understanding the top line',
  intro:'Harmony is the ground; melody is the figure walking across it. A great melody has shape and phrasing, and it dances with the harmony underneath — landing on chord tones, passing through the rest.',
  lessons:[
  { id:'m8l1', title:'Contour & Phrasing', mins:5, blocks:[
    {t:'p',x:'A melody is a single line of notes, but it has <b>shape</b>. Its <span class="term">contour</span> — the path it traces rising and falling — is what you actually remember about a tune, often more than the exact notes. Most memorable melodies have a clear high point (a climax) and a satisfying descent home.'},
    {t:'p',x:'Melodies also breathe. They\'re built from <span class="term">phrases</span> — short musical sentences, usually a few bars long, often arranged in question-and-answer pairs. The first phrase poses a question (ending unresolved); the second answers it (ending settled). That call-and-response is why a good melody feels like it\'s <i>saying</i> something.'},
    {t:'ul',x:[
      '<b>Steps vs leaps:</b> Mostly stepwise motion sounds smooth and singable; an occasional leap creates drama. Too many leaps and the line feels jagged.',
      '<b>Range:</b> Reserve your highest note for the emotional peak — spend it once, not constantly.',
      '<b>Repetition & variation:</b> Repeat a small idea (a motif) so the ear can grab it, then vary it so it doesn\'t bore.'
    ]},
    {t:'note',x:'<b>Tension and release in one line.</b> Even with no harmony, a single melody creates tension by moving away from the home note and rising in pitch, and release by returning and falling. The same home-and-away drama as harmony, drawn as a line.'},
  ]},
  { id:'m8l2', title:'Chord Tones vs Non-Chord Tones', mins:6, blocks:[
    {t:'p',x:'This is the hinge between melody and harmony. At any moment, the notes of the current chord are <span class="term">chord tones</span> — they fuse with the harmony and feel stable. Every other note is a <span class="term">non-chord tone</span> — it creates momentary friction and wants to move.'},
    {t:'p',x:'The craft of melody writing is largely about placement: <b>land chord tones on the strong beats</b> (so the melody and harmony agree where it matters), and <b>use non-chord tones on weak beats</b> to connect them with motion and color.'},
    {t:'widget',label:'Melody meeting harmony',build:()=>melodyDemo(),
      hint:'Play the melody alone, the chords alone, then together. The strong-beat notes lock into the chords; the in-between notes pass through smoothly.'},
    {t:'p',x:'The most common non-chord tones: a <b>passing tone</b> steps between two chord tones; a <b>neighbor tone</b> steps away and back; a <b>suspension</b> holds over and resolves down. Each is a controlled bit of dissonance that makes the line feel alive rather than mechanical.'},
    {t:'note',x:'<b>Melody and harmony as partners.</b> A melody note that clashes on a strong beat sounds like a wrong note; the same note on a weak beat sounds expressive. Nothing is inherently "wrong" — it\'s about <i>where</i> a note lands relative to the chord. Master that placement and you can write a line that sits convincingly over any progression.'},
  ]},
  { id:'m8q', title:'Module 8 Quiz', mins:5, quiz:{ questions:[
    {q:'A melody\'s "contour" is…',
     options:['Its volume','The shape of its rises and falls','Its key signature','Its tempo'], answer:1,
     why:'Contour is the path the line traces up and down — often what makes a tune memorable.'},
    {q:'Most singable melodies move primarily by…',
     options:['Large leaps','Steps, with occasional leaps for drama','Repeated single notes','Random jumps'], answer:1,
     why:'Mostly stepwise motion is smooth and singable; leaps are saved for emotional impact.'},
    {q:'A "chord tone" in a melody is a note that…',
     options:['Belongs to the chord sounding underneath','Is always the highest note','Is off the beat','Clashes with the harmony'], answer:0,
     why:'Chord tones belong to the current chord — they fuse with the harmony and feel stable.'},
    {q:'Good melodic practice is to place chord tones on…',
     options:['Weak beats','Strong beats','Only the last beat','No particular beat'], answer:1,
     why:'Strong-beat chord tones make melody and harmony agree where it matters most.'},
    {q:'A passing tone is…',
     options:['A non-chord tone that steps between two chord tones','A held chord','A loud accent','A key change'], answer:0,
     why:'A passing tone steps smoothly between two chord tones on a weak beat — motion without clashing.'},
    {q:'Whether a melody note sounds "wrong" depends mostly on…',
     options:['How loud it is','Where it lands relative to the chord and beat','The instrument','The key'], answer:1,
     why:'A clash on a strong beat sounds wrong; the same note on a weak beat sounds expressive. Placement is everything.'},
    {q:'Two phrases arranged as a "question" then an "answer" create…',
     options:['Polyrhythm','A sense of call-and-response that feels complete','A cadenza','A key change'], answer:1,
     why:'Question-and-answer phrasing (unresolved then resolved) is why a melody feels like it\'s saying something.'},
  ]}},
]},

/* ---------- MODULE 9 ---------- */
{ n:9, track:'Extended Track', title:'Advanced Harmony',
  blurb:'Modes, borrowing, secondary dominants, modulation',
  intro:'The natural "level 2" and the highest-value addition for composing. Reach beyond the plain diatonic palette: recolor scales as modes, borrow chords from parallel keys, point dominants anywhere, and change key with control.',
  lessons:[
  { id:'m9l1', title:'Modes', mins:6, blocks:[
    {t:'p',x:'Here\'s a beautiful trick hiding in the major scale. Play the white keys from C to C and you get C major. But play the same white keys from <b>D to D</b>, or <b>E to E</b> — same notes, different home base — and you get a completely different color. These are the <span class="term">modes</span>: seven rotations of one scale, each with its own personality.'},
    {t:'p',x:'Because the home note moves, the pattern of steps around it changes, and so does the mood. Same ingredients, different recipe depending on where you start.'},
    {t:'widget',label:'Explore the 7 modes',build:()=>modeExplorer(),
      hint:'These are all built from C so you can hear the color directly. Listen for each mode\'s "characteristic note" — the one altered degree that gives it its flavor (Lydian\'s ♯4 floats; Phrygian\'s ♭2 darkens).'},
    {t:'ul',x:[
      '<b>Ionian</b> = major. <b>Aeolian</b> = natural minor. (You already know these two.)',
      '<b>Dorian</b> — minor but brighter (raised 6th); the sound of "So What", much folk and funk.',
      '<b>Mixolydian</b> — major but bluesy (flat 7th); the sound of countless rock and Celtic tunes.',
      '<b>Lydian</b> — major but dreamy (sharp 4th); that floating film-score wonder.',
      '<b>Phrygian</b> — dark and Spanish (flat 2nd). <b>Locrian</b> — unstable, rarely a home.'
    ]},
    {t:'note',x:'<b>Why modes matter for composing.</b> They let you write something that isn\'t quite major or minor — a specific emotional color. A progression that stays on D Dorian feels different from D minor, even using overlapping notes, because of which note feels like home.'},
  ]},
  { id:'m9l2', title:'Borrowing & Secondary Dominants', mins:6, blocks:[
    {t:'p',x:'Two of the most useful ways to add spice while staying anchored in a key.'},
    {t:'h',x:'Modal interchange (borrowed chords)'},
    {t:'p',x:'You don\'t have to stay inside your key\'s diatonic chords. <span class="term">Modal interchange</span> means borrowing a chord from the <i>parallel</i> key (same root, opposite mode). In C major you can borrow chords from C minor for a sudden, bittersweet color — the most common being the minor iv.'},
    {t:'widget',label:'Borrowing from the parallel minor',build:()=>modalInterchangeDemo(),
      hint:'Compare the plain C–F–G–C with C–Fm–C. That minor iv (Fm) is the borrowed chord — that wistful ache is one of the most-loved sounds in pop ballads.'},
    {t:'h',x:'Secondary dominants'},
    {t:'p',x:'Any chord can be temporarily treated as a mini-tonic by aiming its own dominant at it. A <span class="term">secondary dominant</span> — written "V/V" (five of five) — borrows a dominant chord from outside the key to create a strong, surprising pull toward a chord that isn\'t the real tonic.'},
    {t:'widget',label:'V of V',build:()=>secondaryDomDemo(),
      hint:'C–Dm–G–C is diatonic and plain. Swap Dm for D7 and it becomes the "V of G" — a borrowed dominant that pulls hard into G, adding momentum and a touch of surprise.'},
    {t:'note',x:'<b>The common thread.</b> Both techniques reach <i>just</i> outside the key for a moment, then return. That brief departure is what makes the home key feel richer when you come back — the same tension-and-release principle, now applied to the key itself.'},
  ]},
  { id:'m9l3', title:'Modulation', mins:5, blocks:[
    {t:'p',x:'<span class="term">Modulation</span> is changing key in the middle of a piece — not borrowing a chord for a moment, but genuinely moving the sense of "home" to a new note. It\'s how music keeps a long form fresh and creates a feeling of lift or journey.'},
    {t:'p',x:'The smoothest modulations use a <span class="term">pivot chord</span> — a chord that belongs to <i>both</i> the old key and the new one. You arrive on it in the old key, then reinterpret it in the new key and confirm the change with that key\'s V–I. Because neighbors on the circle of fifths share most of their chords, modulating to a nearby key (especially up a 5th) feels natural; jumping to a distant key feels dramatic.'},
    {t:'widget',label:'Pivoting to a new key',build:()=>modulationDemo(),
      hint:'The second button shifts from C major into G major. The D major chord (G\'s dominant, with its new F♯) is the hinge — once you hear that F♯, your sense of home has moved.'},
    {t:'note',x:'<b>The cheapest trick in pop.</b> The "truck-driver\'s gear change" — bumping the whole song up a half or whole step for the final chorus — is modulation with no pivot, pure brute-force lift. It works because the abrupt new key injects fresh energy. Now you know what\'s actually happening when a song suddenly feels "higher".'},
  ]},
  { id:'m9q', title:'Module 9 Quiz', mins:6, quiz:{ questions:[
    {q:'Modes are…',
     options:['Completely new scales','Rotations of a scale, each starting on a different note for a different color','Only used in jazz','Faster scales'], answer:1,
     why:'The 7 modes are the major scale started from each of its degrees — same notes, different home, different mood.'},
    {q:'Which mode is "major but bluesy", with a flat 7th?',
     options:['Dorian','Lydian','Mixolydian','Phrygian'], answer:2,
     why:'Mixolydian = major with a ♭7 — the dominant, bluesy, rock/folk sound.'},
    {q:'Modal interchange (borrowing) means using a chord from…',
     options:['A random key','The parallel key (same root, opposite mode)','The relative key only','A different song'], answer:1,
     why:'You borrow from the parallel key — e.g. pulling the minor iv from C minor while in C major.'},
    {q:'A secondary dominant (V/V) is used to…',
     options:['End a song','Create a strong pull toward a chord that isn\'t the tonic','Slow the tempo','Add a drum beat'], answer:1,
     why:'It aims a borrowed dominant at a non-tonic chord, temporarily making that chord feel like home.'},
    {q:'A pivot chord in modulation is one that…',
     options:['Is the loudest','Belongs to both the old and new key','Is always the tonic','Has seven notes'], answer:1,
     why:'A pivot belongs to both keys, letting you slip smoothly from one to the other.'},
    {q:'Modulating to a key NEARBY on the circle of fifths feels…',
     options:['Jarring','Smooth, because the keys share most of their notes','Impossible','The same as a distant key'], answer:1,
     why:'Neighbors share most chords, so the move is smooth; distant keys share few and feel dramatic.'},
    {q:'Listen — same notes, different home. This is a mode. Which one floats with a "dreamy ♯4"?', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.seq(buildMode(60,3),0.34,0.34)),
     options:['Dorian','Phrygian','Lydian','Aeolian'], answer:2,
     why:'Lydian — the raised 4th gives that floating, wondrous, film-score quality.'},
  ]}},
]},

/* ---------- MODULE 10 ---------- */
{ n:10, track:'Extended Track', title:'Rhythm & Meter',
  blurb:'The time dimension — pulse, subdivision, groove',
  intro:'Pitch is only half of music; rhythm is the other half. Treated as a first-class topic: how beats group into meter, how the beat subdivides, and how playing against the grid creates groove.',
  lessons:[
  { id:'m10l1', title:'Beat, Tempo & Meter', mins:5, blocks:[
    {t:'p',x:'Underneath most music is a steady pulse — the <span class="term">beat</span>, the thing you tap your foot to. How fast those beats go is the <span class="term">tempo</span>, measured in beats per minute (BPM): 60 BPM is one beat per second; 120 is brisk pop; 70 is a slow ballad.'},
    {t:'p',x:'Beats aren\'t all equal — they group into repeating patterns of strong and weak, and that grouping is the <span class="term">meter</span>. We feel a recurring accent: <b>ONE</b>-two-three-four, <b>ONE</b>-two-three-four. The strong beat (the "downbeat") marks the start of each group, called a <span class="term">bar</span> or measure.'},
    {t:'p',x:'A <span class="term">time signature</span> writes this down as two stacked numbers. The top number is how many beats per bar; the bottom says what kind of note gets one beat. <b>4/4</b> (four beats per bar) is by far the most common — "common time". <b>3/4</b> gives the waltz lilt (ONE-two-three). <b>6/8</b> has a rolling, compound feel.'},
    {t:'widget',label:'Hear different meters',build:()=>rhythmLab(),
      hint:'Set 4/4, then 3/4, then 6/8 and play. The loud click is beat "1". Feel how the placement of that accent completely changes the character — march vs waltz vs roll.'},
    {t:'note',x:'<b>Meter is felt, not just counted.</b> The same notes barred in 3/4 vs 4/4 feel different because your body anticipates the next downbeat. Meter is a grid of expectation — and the next lesson is about what happens when you play with that expectation.'},
  ]},
  { id:'m10l2', title:'Subdivision & Note Values', mins:5, blocks:[
    {t:'p',x:'A beat isn\'t the smallest unit — you can split it. <span class="term">Subdivision</span> is dividing each beat into equal parts to get faster rhythms without speeding up the tempo. Split a beat in two and you have eighth notes; in four, sixteenth notes; in three, triplets.'},
    {t:'p',x:'<span class="term">Note values</span> name these durations. A whole note lasts four beats (in 4/4), a half note two, a quarter note one, an eighth note half a beat, a sixteenth a quarter of a beat. Each step down the ladder is twice as fast — the same doubling logic as octaves, now in time instead of pitch.'},
    {t:'widget',label:'Subdivide the beat',build:()=>rhythmLab(),
      hint:'Keep 4/4 and step through Quarters → Eighths → Triplets → 16ths. The pulse stays the same; you\'re just filling each beat with more (or fewer) hits. Triplets vs eighths is the key feel difference between "straight" and "swung".'},
    {t:'note',x:'<b>Rests count too.</b> Silence is rhythm. A rest is a note value you <i>don\'t</i> play, and skilled use of rests — leaving space — often does more than adding notes. The gap before a hit makes the hit land harder.'},
    {t:'note',k:'code',x:'// Procedural lens: rhythm is a grid.\n// One bar of 4/4 at 16th resolution = 16 slots.\n// A pattern is just which slots are "on".\n// Tempo (BPM) sets the real-time length of each slot.'},
  ]},
  { id:'m10l3', title:'Syncopation, Groove & Polyrhythm', mins:6, blocks:[
    {t:'p',x:'If meter is the grid of expected accents, <span class="term">syncopation</span> is deliberately accenting the <i>wrong</i> places — the off-beats, the gaps between the main pulses. This push-and-pull against the grid is the secret ingredient of <span class="term">groove</span>. It\'s why funk, reggae, ska, and most pop feel alive rather than mechanical.'},
    {t:'widget',label:'Straight vs syncopated',build:()=>syncopationDemo(),
      hint:'The straight version hits squarely on the beats — correct but stiff. The syncopated version accents the spaces between beats, and suddenly it has feel. Same tempo, completely different energy.'},
    {t:'h',x:'Polyrhythm: two pulses at once'},
    {t:'p',x:'A <span class="term">polyrhythm</span> layers two different beat divisions simultaneously — most classically <b>3 against 2</b>: one part divides the span into three, another into two, both starting and ending together. The ear can\'t fully resolve which is "the" beat, creating a shimmering, rolling complexity at the heart of much African, Latin, and progressive music.'},
    {t:'widget',label:'3 against 2',build:()=>polyrhythmDemo(),
      hint:'Hear the 2-pulse alone, then the 3-pulse alone, then both at once. They lock at the start and finish but disagree in the middle — that disagreement is the groove.'},
    {t:'note',x:'<b>Metric ambiguity.</b> Composers sometimes blur where the downbeat is on purpose, so a passage can be heard in more than one meter at once. It\'s the rhythmic equivalent of an optical illusion — and a peek at the advanced edge of how rhythm creates tension all on its own, with no change in pitch at all.'},
  ]},
  { id:'m10q', title:'Module 10 Quiz', mins:6, quiz:{ questions:[
    {q:'Tempo is measured in…',
     options:['Beats per minute (BPM)','Hertz','Decibels','Bars'], answer:0,
     why:'Tempo = how fast the beat goes, in BPM. 120 BPM is brisk pop; 60 is one beat per second.'},
    {q:'In a 3/4 time signature, each bar has…',
     options:['Three bars','Three beats','Four beats','Three songs'], answer:1,
     why:'The top number is beats per bar — 3/4 = three beats per bar, the waltz feel.'},
    {q:'Subdivision means…',
     options:['Slowing the tempo','Splitting each beat into equal smaller parts','Changing key','Adding more instruments'], answer:1,
     why:'Subdividing fills each beat with more hits (eighths, triplets, 16ths) without changing the tempo.'},
    {q:'An eighth note lasts…',
     options:['Eight beats','Two beats','Half a beat (in 4/4)','A whole bar'], answer:2,
     why:'A quarter note = one beat, so an eighth note = half a beat. Each note value is twice as fast as the one above.'},
    {q:'Syncopation creates groove by…',
     options:['Accenting the off-beats / spaces between beats','Playing only on beat 1','Slowing down','Removing all accents'], answer:0,
     why:'Emphasizing the off-beats pushes against the grid — that tension is groove.'},
    {q:'A "3 against 2" polyrhythm is…',
     options:['Three songs at once','Two different beat-divisions layered over the same span','A key change','A type of cadence'], answer:1,
     why:'One part divides the span in three, another in two — both starting and ending together.'},
    {q:'Listen — is this rhythm straight (on the beat) or syncopated?', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.pattern([{b:0,accent:true},{b:0.5,accent:false},{b:1.5,accent:true},{b:2.5,accent:true},{b:3,accent:false},{b:4,accent:true},{b:4.5,accent:false},{b:5.5,accent:true},{b:6.5,accent:true},{b:7,accent:false}],100)),
     options:['Straight','Syncopated'], answer:1,
     why:'The accents land between the beats — that\'s syncopation, the source of groove.'},
  ]}},
]},

/* ---------- MODULE 11 ---------- */
{ n:11, track:'Extended Track', title:'Texture & Arrangement',
  blurb:'How multiple parts combine into a finished sound',
  intro:'The final layer: how independent lines and voices combine. Texture is the weave of the parts; arrangement is how you distribute material across registers and instruments to shape emotion and clarity.',
  lessons:[
  { id:'m11l1', title:'Texture Types', mins:5, blocks:[
    {t:'p',x:'<span class="term">Texture</span> describes how many independent musical lines are sounding and how they relate. There are three basic kinds, and most music is one of them or a blend.'},
    {t:'ul',x:[
      '<b>Monophony</b> — a single line, alone. One singer, an unaccompanied flute, a guitar riff with nothing under it. Pure and exposed.',
      '<b>Homophony</b> — one main melody supported by accompaniment (chords) that moves <i>with</i> it. This is the texture of nearly all pop, rock and folk: a tune on top, chords beneath.',
      '<b>Polyphony</b> — two or more independent melodies of equal importance woven together at once. A round like "Row Your Boat", a Bach fugue, interlocking guitar parts.'
    ]},
    {t:'widget',label:'Hear the three textures',build:()=>textureLab(),
      hint:'The same little tune presented three ways: alone (mono), with chords beneath (homo), and against a second independent line (poly). Notice how much the texture alone changes the feeling.'},
    {t:'note',x:'<b>Texture is a dial, not a box.</b> A song can move between textures for effect — a verse that\'s sparse and monophonic exploding into a full homophonic chorus, or a bridge where two vocal lines turn polyphonic. Changing texture is one of the strongest tools for shaping a song\'s energy.'},
  ]},
  { id:'m11l2', title:'Counterpoint & Arrangement', mins:6, blocks:[
    {t:'p',x:'<span class="term">Counterpoint</span> is the craft behind polyphony: writing two or more melodic lines that are independent (each interesting on its own) yet agree harmonically (they sound good together). It\'s the most rigorous corner of theory, but one idea carries most of the weight.'},
    {t:'widget',label:'Two lines in counterpoint',build:()=>counterpointDemo(),
      hint:'Each line is a real melody on its own. Play them together: when the top rises, the bottom tends to fall. That contrary motion keeps the lines independent while staying consonant.'},
    {t:'p',x:'The golden principle is <b>independence through contrary motion</b>: when voices move in opposite directions, the ear hears them as separate characters rather than one thickened line. Combine that with consonant intervals on the strong beats and you have the essence of good counterpoint.'},
    {t:'h',x:'Arrangement: distributing the material'},
    {t:'p',x:'<span class="term">Arrangement</span> is deciding <i>who plays what, where</i>. The same chords and melody can sound thin and cold or huge and warm depending on choices about register (high vs low), doubling (how many parts play the same note), spacing (how far apart the notes sit), and density (how much is happening at once).'},
    {t:'widget',label:'Spacing changes everything',build:()=>arrangementDemo(),
      hint:'The exact same C major chord: thin and high, wide and spread, or cramped low. Low notes packed close turn to mud — a key practical lesson: give the bass room.'},
    {t:'note',x:'<b>Arrangement shapes emotion as much as the notes.</b> A melody alone in a high register feels fragile; doubled in octaves with full chords beneath, it feels triumphant — with zero change to the actual pitches. Knowing the notes is composing; knowing how to place them is arranging, and the two together are what make a finished piece.'},
  ]},
  { id:'m11q', title:'Module 11 Quiz', mins:5, quiz:{ questions:[
    {q:'Monophony is…',
     options:['A single line with no accompaniment','Melody plus chords','Two independent melodies','A type of chord'], answer:0,
     why:'Monophony = one line, alone. A solo voice or unaccompanied instrument.'},
    {q:'The texture of most pop and rock — a melody with chordal accompaniment beneath — is…',
     options:['Monophony','Homophony','Polyphony','Counterpoint'], answer:1,
     why:'Homophony: one main melody supported by accompaniment moving with it.'},
    {q:'Polyphony means…',
     options:['Many instruments playing the same note','Two or more independent melodies of equal importance at once','A loud texture','No melody'], answer:1,
     why:'Polyphony weaves multiple independent melodic lines — a round, a fugue, interlocking parts.'},
    {q:'The key principle for keeping contrapuntal lines independent is…',
     options:['Parallel motion','Contrary motion (moving in opposite directions)','Playing in unison','Same rhythm always'], answer:1,
     why:'Contrary motion makes the ear hear separate characters rather than one thick line.'},
    {q:'Arrangement is mainly about…',
     options:['Which notes to write','How to distribute notes across registers, doublings and density','The key signature','The tempo'], answer:1,
     why:'Arrangement is who plays what, where — register, doubling, spacing, density.'},
    {q:'Low notes packed closely together tend to sound…',
     options:['Bright and clear','Muddy — they need wider spacing','Louder','Higher'], answer:1,
     why:'Close-spaced low notes turn to mud; give the bass register room to breathe.'},
    {q:'Listen — one melodic idea three ways. Which button gives polyphony?', sub:'Use the texture widget above, then answer.',
     build:()=>el('div','whint','(Compare in the widget above.)'),
     options:['The single line alone','The line with chords beneath','The two independent lines woven together','None'], answer:2,
     why:'Polyphony = two independent melodies at once, each meaningful on its own.'},
  ]}},
]},
];

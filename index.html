<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1115">
<title>Theory — Interactive Music Theory</title>
<style>
:root{
  --bg:#0f1115; --bg2:#171a21; --bg3:#1f2430; --line:#2a3040;
  --txt:#e7eaf0; --dim:#9aa3b2; --faint:#6b7382;
  --accent:#6ea8ff; --accent2:#7ee0c0; --warn:#ffcf6e; --bad:#ff7a8a; --good:#7ee0a0;
  --root:#ff7a8a; --hi:#6ea8ff; --hi2:#7ee0c0; --hi3:#ffcf6e;
  --r:14px; --r2:10px;
  font-size:16px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  line-height:1.55; overscroll-behavior-y:contain;}
body{padding-bottom:90px;}
a{color:var(--accent);}
h1,h2,h3{line-height:1.25;font-weight:700;}
.wrap{max-width:680px;margin:0 auto;padding:0 16px;}

/* Top bar */
header{position:sticky;top:0;z-index:50;background:rgba(15,17,21,.86);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
.bar{display:flex;align-items:center;gap:12px;height:54px;}
.bar .back{font-size:1.5rem;line-height:1;background:none;border:none;color:var(--txt);
  cursor:pointer;padding:6px 4px;display:none;}
.bar .ttl{font-weight:700;font-size:1.02rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar .brand{font-weight:800;letter-spacing:.5px;}
.bar .brand b{color:var(--accent);}
.bar .pct{font-size:.8rem;color:var(--dim);background:var(--bg3);padding:4px 9px;border-radius:20px;}

/* Home */
.hero{padding:26px 0 8px;}
.hero h1{font-size:1.7rem;margin:0 0 6px;}
.hero p{color:var(--dim);margin:0;}
.track-h{font-size:.78rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--faint);
  margin:26px 0 10px;font-weight:700;}
.mod{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--line);
  border-radius:var(--r);padding:15px 16px;margin-bottom:12px;cursor:pointer;
  transition:transform .08s ease,border-color .15s;}
.mod:active{transform:scale(.985);}
.mod.locked{opacity:.5;}
.mod .num{width:42px;height:42px;flex:none;border-radius:12px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent);font-size:1.1rem;}
.mod.done .num{background:var(--good);color:#06210f;}
.mod .mi{flex:1;min-width:0;}
.mod .mi h3{margin:0;font-size:1.02rem;}
.mod .mi p{margin:2px 0 0;color:var(--dim);font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mbar{height:5px;background:var(--bg3);border-radius:5px;margin-top:8px;overflow:hidden;}
.mbar i{display:block;height:100%;background:var(--accent);border-radius:5px;transition:width .4s;}
.mod.done .mbar i{background:var(--good);}
.chev{color:var(--faint);font-size:1.2rem;}

/* Lesson list within module */
.lesson-row{display:flex;align-items:center;gap:13px;background:var(--bg2);border:1px solid var(--line);
  border-radius:var(--r2);padding:13px 14px;margin-bottom:9px;cursor:pointer;transition:transform .08s;}
.lesson-row:active{transform:scale(.985);}
.lesson-row .dot{width:24px;height:24px;flex:none;border-radius:50%;border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--faint);}
.lesson-row.done .dot{background:var(--good);border-color:var(--good);color:#06210f;}
.lesson-row .lt{flex:1;}
.lesson-row .lt b{font-weight:600;font-size:.97rem;}
.lesson-row .lt span{display:block;color:var(--faint);font-size:.8rem;}
.kind-quiz .dot{border-style:dashed;}

/* Lesson content */
.lesson{padding:18px 0 40px;}
.lesson h2{font-size:1.45rem;margin:6px 0 4px;}
.lesson .eyebrow{color:var(--accent);font-weight:700;font-size:.78rem;letter-spacing:1px;text-transform:uppercase;}
.lesson p{margin:14px 0;color:#d4dae6;}
.lesson p b,.lesson li b{color:var(--txt);}
.lesson h3{font-size:1.13rem;margin:26px 0 6px;}
.lesson ul{margin:12px 0;padding-left:20px;color:#d4dae6;}
.lesson li{margin:6px 0;}
.term{color:var(--accent2);font-weight:600;border-bottom:1px dotted var(--faint);}
.callout{background:var(--bg2);border:1px solid var(--line);border-left:3px solid var(--accent);
  border-radius:10px;padding:13px 15px;margin:18px 0;color:#d4dae6;font-size:.94rem;}
.callout.phys{border-left-color:var(--hi2);}
.callout.code{border-left-color:var(--warn);font-family:ui-monospace,Menlo,monospace;font-size:.85rem;}
.callout b{color:var(--txt);}
.widget{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);
  padding:16px 14px;margin:20px 0;}
.widget .wlabel{font-size:.8rem;color:var(--dim);margin-bottom:12px;text-align:center;}
.widget .whint{font-size:.78rem;color:var(--faint);margin-top:10px;text-align:center;}

/* Buttons / chips */
.btn{background:var(--accent);color:#08111f;border:none;border-radius:10px;padding:11px 18px;
  font-weight:700;font-size:.95rem;cursor:pointer;transition:transform .08s,opacity .15s;}
.btn:active{transform:scale(.96);}
.btn.sec{background:var(--bg3);color:var(--txt);}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt);}
.btn:disabled{opacity:.4;cursor:default;}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:6px 0;}
.chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:10px 0;}
.chip{background:var(--bg3);border:1px solid var(--line);color:var(--txt);border-radius:20px;
  padding:8px 14px;font-size:.9rem;cursor:pointer;font-weight:600;transition:transform .08s;}
.chip:active{transform:scale(.94);}
.chip.on{background:var(--accent);color:#08111f;border-color:var(--accent);}
.chip.on2{background:var(--accent2);color:#06251c;border-color:var(--accent2);}

/* Quiz */
.quiz{margin:6px 0;}
.qcard{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:18px 16px;}
.qprog{font-size:.78rem;color:var(--faint);margin-bottom:6px;}
.qbar{height:5px;background:var(--bg3);border-radius:5px;margin-bottom:16px;overflow:hidden;}
.qbar i{display:block;height:100%;background:var(--accent2);transition:width .3s;}
.qq{font-size:1.12rem;font-weight:600;margin-bottom:6px;}
.qsub{color:var(--dim);font-size:.88rem;margin-bottom:14px;}
.opt{display:block;width:100%;text-align:left;background:var(--bg3);border:1.5px solid var(--line);
  color:var(--txt);border-radius:11px;padding:13px 15px;margin-bottom:10px;font-size:.97rem;cursor:pointer;
  transition:transform .06s,border-color .15s,background .15s;}
.opt:active{transform:scale(.99);}
.opt.correct{border-color:var(--good);background:rgba(126,224,160,.12);}
.opt.wrong{border-color:var(--bad);background:rgba(255,122,138,.12);}
.opt.dim{opacity:.5;}
.feedback{margin-top:12px;padding:12px 14px;border-radius:10px;font-size:.92rem;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:rgba(126,224,160,.1);border:1px solid var(--good);color:#bff0d0;}
.feedback.no{background:rgba(255,122,138,.1);border:1px solid var(--bad);color:#ffd0d6;}
.result{text-align:center;padding:20px 10px;}
.result .big{font-size:2.6rem;font-weight:800;}
.result .lbl{color:var(--dim);}

/* Practice drill */
.drill{background:linear-gradient(180deg,rgba(126,224,192,.06),var(--bg2));border:1px solid var(--line);
  border-left:3px solid var(--accent2);border-radius:var(--r);padding:15px 14px;margin:20px 0;}
.drill-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px;}
.drill-badge{font-size:.66rem;font-weight:800;letter-spacing:1.5px;color:#06251c;background:var(--accent2);
  padding:3px 8px;border-radius:6px;}
.drill-score{font-size:.78rem;color:var(--dim);font-variant-numeric:tabular-nums;}
.drill-score b{color:var(--accent2);}
.drill-intro{font-size:.84rem;color:var(--dim);margin:6px 0 12px;}
.drill-stage{text-align:center;margin:6px 0 12px;min-height:20px;}
.drill-prompt{font-size:1.02rem;font-weight:600;margin-bottom:10px;}
.drill-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.drill-choices .opt{margin:0;text-align:center;}
.drill .feedback{margin-top:10px;}
.drill-start{text-align:center;}
.drill-set{font-size:.72rem;color:var(--faint);text-align:center;margin-top:8px;}
.drill-anchor{font-size:.82rem;color:var(--warn);text-align:center;margin:8px 0 2px;}

/* Segmented control (ladder stages) */
.seg{display:flex;background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px;margin:4px 0 12px;}
.seg button{flex:1;background:none;border:none;color:var(--dim);font-weight:700;font-size:.8rem;
  padding:8px 4px;border-radius:8px;cursor:pointer;line-height:1.1;}
.seg button.on{background:var(--accent2);color:#06251c;}
.seg button:disabled{opacity:.35;cursor:default;}
.seg .lock{font-size:.62rem;display:block;font-weight:600;opacity:.7;}

/* Flashcard (Hear & Learn) */
.flash{text-align:center;}
.flash .fcard{background:var(--bg3);border:1px solid var(--line);border-radius:12px;padding:20px 14px;margin:10px 0;}
.flash .fname{font-size:1.5rem;font-weight:800;color:var(--accent2);}
.flash .fsub{color:var(--dim);font-size:.9rem;margin-top:4px;}
.flash .fanchor{color:var(--warn);font-size:.85rem;margin-top:8px;}

/* Home practice card */
.praccard{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,rgba(126,224,192,.14),rgba(110,168,255,.10));
  border:1px solid var(--accent2);border-radius:var(--r);padding:15px 16px;margin-bottom:12px;cursor:pointer;transition:transform .08s;}
.praccard:active{transform:scale(.985);}
.praccard .pic{width:42px;height:42px;flex:none;border-radius:12px;background:var(--accent2);color:#06251c;
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
.praccard .pi{flex:1;min-width:0;}
.praccard .pi h3{margin:0;font-size:1.02rem;}
.praccard .pi p{margin:2px 0 0;color:var(--dim);font-size:.85rem;}

/* Practice hub */
.skill-row{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--line);
  border-radius:var(--r2);padding:12px 14px;margin-bottom:9px;cursor:pointer;transition:transform .08s;}
.skill-row:active{transform:scale(.985);}
.skill-row.locked{opacity:.45;cursor:default;}
.skill-row .si{flex:1;min-width:0;}
.skill-row .si b{font-weight:600;font-size:.96rem;}
.skill-row .si span{display:block;color:var(--faint);font-size:.78rem;margin-top:1px;}
.stars{flex:none;color:var(--faint);font-size:.95rem;letter-spacing:1px;}
.stars b{color:var(--warn);font-weight:400;}
.mastery-bar{height:5px;background:var(--bg3);border-radius:5px;margin-top:6px;overflow:hidden;}
.mastery-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:5px;transition:width .4s;}
.sess-sum{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--line);
  border-radius:10px;padding:10px 13px;margin-bottom:8px;font-size:.9rem;}
.sess-sum .up{color:var(--good);font-size:.8rem;font-weight:700;}

/* Footer nav */
.fnav{position:fixed;bottom:0;left:0;right:0;background:rgba(15,17,21,.92);backdrop-filter:blur(12px);
  border-top:1px solid var(--line);padding:10px 16px calc(10px + env(safe-area-inset-bottom));z-index:50;}
.fnav .wrap{display:flex;gap:10px;}
.fnav .btn{flex:1;text-align:center;}

/* SVG widgets */
svg{display:block;width:100%;height:auto;touch-action:manipulation;}
.pkey{cursor:pointer;}
.note-pop{position:fixed;background:var(--accent);color:#08111f;font-weight:800;padding:6px 12px;
  border-radius:8px;font-size:.95rem;pointer-events:none;opacity:0;transition:opacity .15s;z-index:99;}
.tcell{cursor:pointer;}
.scrolltip{font-size:.75rem;color:var(--faint);text-align:center;margin-top:6px;}
.hidden{display:none!important;}
.fade{animation:fade .35s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<header><div class="wrap bar">
  <button class="back" id="backBtn">‹</button>
  <div class="ttl" id="barTitle"><span class="brand">THEORY<b>.</b></span></div>
  <div class="pct" id="barPct">0%</div>
</div></header>

<main class="wrap" id="app"></main>

<div class="fnav hidden" id="fnav"><div class="wrap" id="fnavInner"></div></div>
<div class="note-pop" id="notePop"></div>

<script>
"use strict";
/* ============================================================
   AUDIO ENGINE  — Web Audio API, no external files
   ============================================================ */
const Audio_ = (()=>{
  let ctx=null;
  function ac(){ if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==='suspended') ctx.resume(); return ctx; }
  // midi -> frequency
  function freq(m){ return 440*Math.pow(2,(m-69)/12); }
  function tone(m,t0,dur,gainMul=1,type='triangle'){
    const c=ac();
    const o=c.createOscillator(), g=c.createGain();
    const o2=c.createOscillator(), g2=c.createGain();
    o.type=type; o.frequency.value=freq(m);
    o2.type='sine'; o2.frequency.value=freq(m); // body
    const peak=0.22*gainMul;
    g.gain.setValueAtTime(0,t0);
    g.gain.linearRampToValueAtTime(peak,t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    g2.gain.setValueAtTime(0,t0);
    g2.gain.linearRampToValueAtTime(peak*0.6,t0+0.012);
    g2.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g).connect(c.destination);
    o2.connect(g2).connect(c.destination);
    o.start(t0); o.stop(t0+dur+0.05);
    o2.start(t0); o2.stop(t0+dur+0.05);
  }
  return {
    note(m,dur=0.8){ const c=ac(); tone(m,c.currentTime,dur); },
    chord(arr,dur=1.2){ const c=ac(); arr.forEach(m=>tone(m,c.currentTime,dur,0.8)); },
    seq(arr,step=0.55,dur=0.5){ const c=ac(); arr.forEach((m,i)=>tone(m,c.currentTime+i*step,dur)); },
    interval(a,b,dur=0.7,gap=0.6){ const c=ac(); tone(a,c.currentTime,dur); tone(b,c.currentTime+gap,dur);
      tone(a,c.currentTime+gap*2,dur,0.8); tone(b,c.currentTime+gap*2,dur,0.8); },
    // schedule a list of chords (each chord = array of midi), one per step
    progression(chords,step=1.0,dur=0.92){ const c=ac(); const t=c.currentTime+0.04;
      chords.forEach((ch,i)=>ch.forEach(m=>tone(m,t+i*step,dur,0.6))); },
    // arpeggiate a chord then play it as a block
    arpThenBlock(arr,astep=0.18){ const c=ac(); const t=c.currentTime+0.03;
      arr.forEach((m,i)=>tone(m,t+i*astep,0.5,0.8));
      const tb=t+arr.length*astep+0.15; arr.forEach(m=>tone(m,tb,1.1,0.6)); },
    // flexible layered events: [{m,t,d,g,type}]
    layer(events){ const c=ac(); const t=c.currentTime+0.04;
      events.forEach(e=>tone(e.m,t+(e.t||0),e.d||0.5,e.g||0.7,e.type||'triangle')); },
    // metronome / rhythm: hits=[{b:beatPosition, accent:bool}], bpm tempo
    pattern(hits,bpm=100){ const c=ac(); const spb=60/bpm; const t0=c.currentTime+0.06;
      hits.forEach(h=>{ const t=t0+h.b*spb; const o=c.createOscillator(),g=c.createGain();
        o.type='square'; o.frequency.value=h.accent?2200:1500;
        const pk=h.accent?0.32:0.15; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(pk,t+0.002);
        g.gain.exponentialRampToValueAtTime(0.0001,t+0.085);
        o.connect(g).connect(c.destination); o.start(t); o.stop(t+0.12); }); },
    freq
  };
})();

/* ============================================================
   MUSIC THEORY HELPERS
   ============================================================ */
const SHARP=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLAT =['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const NAT = {C:0,D:2,E:4,F:5,G:7,A:9,B:11};
function pcName(pc,pref='sharp'){ return (pref==='flat'?FLAT:SHARP)[((pc%12)+12)%12]; }
function midiName(m){ return SHARP[m%12]+ (Math.floor(m/12)-1); }
const C4=60; // middle C
// interval data: semitones -> {short,name,quality}
const INTERVALS=[
 {st:0, sh:'P1', name:'Perfect unison', col:'consonant'},
 {st:1, sh:'m2', name:'Minor 2nd', col:'dissonant'},
 {st:2, sh:'M2', name:'Major 2nd', col:'dissonant'},
 {st:3, sh:'m3', name:'Minor 3rd', col:'consonant'},
 {st:4, sh:'M3', name:'Major 3rd', col:'consonant'},
 {st:5, sh:'P4', name:'Perfect 4th', col:'perfect'},
 {st:6, sh:'TT', name:'Tritone', col:'dissonant'},
 {st:7, sh:'P5', name:'Perfect 5th', col:'perfect'},
 {st:8, sh:'m6', name:'Minor 6th', col:'consonant'},
 {st:9, sh:'M6', name:'Major 6th', col:'consonant'},
 {st:10,sh:'m7', name:'Minor 7th', col:'dissonant'},
 {st:11,sh:'M7', name:'Major 7th', col:'dissonant'},
 {st:12,sh:'P8', name:'Perfect octave', col:'consonant'},
];
const SCALES={
  major:        {name:'Major', steps:[2,2,1,2,2,2,1]},
  natminor:     {name:'Natural minor', steps:[2,1,2,2,1,2,2]},
  harmonicminor:{name:'Harmonic minor', steps:[2,1,2,2,1,3,1]},
  melodicminor: {name:'Melodic minor', steps:[2,1,2,2,2,2,1]},
};
function buildScale(rootMidi, key){ const s=SCALES[key].steps; const out=[rootMidi]; let m=rootMidi;
  for(const st of s){ m+=st; out.push(m);} return out; } // 8 notes incl octave
// Circle of fifths order of major keys (sharps then flats)
const CIRCLE=['C','G','D','A','E','B','Gb','Db','Ab','Eb','Bb','F'];
const KEYSIG={C:0,G:1,D:2,A:3,E:4,B:5,'Gb':6,'Db':5,'Ab':4,'Eb':3,'Bb':2,'F':1};
const KEYSIGTYPE={C:'',G:'#',D:'#',A:'#',E:'#',B:'#','Gb':'b','Db':'b','Ab':'b','Eb':'b','Bb':'b','F':'b'};

// --- Chords ---
const CHORDS={
 maj: {lab:'Major',      iv:[0,4,7],     sym:''},
 min: {lab:'Minor',      iv:[0,3,7],     sym:'m'},
 dim: {lab:'Diminished', iv:[0,3,6],     sym:'°'},
 aug: {lab:'Augmented',  iv:[0,4,8],     sym:'+'},
 maj7:{lab:'Major 7th',  iv:[0,4,7,11],  sym:'maj7'},
 min7:{lab:'Minor 7th',  iv:[0,3,7,10],  sym:'m7'},
 dom7:{lab:'Dominant 7th',iv:[0,4,7,10], sym:'7'},
 m7b5:{lab:'Half-dim 7th',iv:[0,3,6,10], sym:'m7♭5'},
 dim7:{lab:'Diminished 7th',iv:[0,3,6,9],sym:'°7'},
 add9:{lab:'Add 9',      iv:[0,4,7,14],  sym:'add9'},
 dom9:{lab:'Dominant 9th',iv:[0,4,7,10,14],sym:'9'},
};
function buildChord(rootMidi,type){ return CHORDS[type].iv.map(i=>rootMidi+i); }
function chordName(rootPc,type,pref='sharp'){ return pcName(rootPc,pref)+CHORDS[type].sym; }

// Diatonic qualities (triads) per scale degree
const MAJ_DIATONIC=[{rn:'I',q:'maj'},{rn:'ii',q:'min'},{rn:'iii',q:'min'},{rn:'IV',q:'maj'},{rn:'V',q:'maj'},{rn:'vi',q:'min'},{rn:'vii°',q:'dim'}];
const MIN_DIATONIC=[{rn:'i',q:'min'},{rn:'ii°',q:'dim'},{rn:'III',q:'maj'},{rn:'iv',q:'min'},{rn:'v',q:'min'},{rn:'VI',q:'maj'},{rn:'VII',q:'maj'}];
// two-octave scale for stacking thirds
function scale2oct(rootMidi,key){ const one=buildScale(rootMidi,key); return one.concat(one.slice(1).map(m=>m+12)); }
function diatonicTriad(rootMidi,key,degIdx){ const s=scale2oct(rootMidi,key); return [s[degIdx],s[degIdx+2],s[degIdx+4]]; }
function diatonicSeventh(rootMidi,key,degIdx){ const s=scale2oct(rootMidi,key); return [s[degIdx],s[degIdx+2],s[degIdx+4],s[degIdx+6]]; }

// --- Modes (rotations of the major scale) ---
const MODES=[
 {name:'Ionian',  alias:'Major',         rot:0, char:'—',     mood:'Bright, stable — the default major sound'},
 {name:'Dorian',  alias:'',              rot:1, char:'♮6',    mood:'Minor but hopeful; jazz, funk, Celtic'},
 {name:'Phrygian',alias:'',              rot:2, char:'♭2',    mood:'Dark, Spanish/flamenco, metal tension'},
 {name:'Lydian',  alias:'',              rot:3, char:'♯4',    mood:'Dreamy, floating, film-score wonder'},
 {name:'Mixolydian',alias:'',            rot:4, char:'♭7',    mood:'Major but bluesy; rock, folk, dominant feel'},
 {name:'Aeolian', alias:'Natural minor', rot:5, char:'♭6',    mood:'Plain, sad minor'},
 {name:'Locrian', alias:'',              rot:6, char:'♭2 ♭5', mood:'Unstable, dissonant — rarely a home base'},
];
function buildMode(rootMidi,rot){ const st=SCALES.major.steps; const rs=st.slice(rot).concat(st.slice(0,rot));
  const out=[rootMidi]; let m=rootMidi; for(const s of rs){ m+=s; out.push(m);} return out; }

/* ============================================================
   PROGRESS (localStorage)
   ============================================================ */
const Progress=(()=>{
  const KEY='theory_progress_v1';
  let data=JSON.parse(localStorage.getItem(KEY)||'{}');
  function save(){ localStorage.setItem(KEY,JSON.stringify(data)); }
  return {
    done(id){ return !!data[id]; },
    mark(id,v=true){ data[id]=v?{t:Date.now()}:undefined; if(!v) delete data[id]; save(); },
    score(id,s){ data[id]={t:Date.now(),score:s}; save(); },
    get(id){ return data[id]; },
    raw(){ return data; }
  };
})();

/* ============================================================
   WIDGET FACTORIES
   ============================================================ */
let popTimer=null;
function showPop(text,x,y){ const p=document.getElementById('notePop');
  p.textContent=text; p.style.left=(x)+'px'; p.style.top=(y-46)+'px';
  p.style.transform='translateX(-50%)'; p.style.opacity='1';
  clearTimeout(popTimer); popTimer=setTimeout(()=>p.style.opacity='0',700); }

/* ---- PIANO KEYBOARD ----
   opts: {low, high, highlight:{midi:colorKey}, labels:bool, root:midi, onClick} */
function Piano(opts={}){
  const low=opts.low!=null?opts.low:60, high=opts.high!=null?opts.high:72;
  const hi=opts.highlight||{}; const labels=opts.labels!==false;
  const whiteW=42, whiteH=150, blackW=27, blackH=95;
  const whites=[]; for(let m=low;m<=high;m++){ if([1,3,6,8,10].indexOf(m%12)<0) whites.push(m); }
  const W=whites.length*whiteW;
  const colMap={root:'var(--root)',hi:'var(--hi)',hi2:'var(--hi2)',hi3:'var(--hi3)'};
  const xOf={}; whites.forEach((m,i)=>xOf[m]=i*whiteW);
  let svg=`<svg viewBox="0 0 ${W} ${whiteH+4}" xmlns="http://www.w3.org/2000/svg">`;
  // white keys
  whites.forEach(m=>{
    const c=hi[m]?colMap[hi[m]]:'#f4f6fa';
    svg+=`<rect class="pkey" data-m="${m}" x="${xOf[m]+1}" y="1" width="${whiteW-2}" height="${whiteH}" rx="5"
      fill="${c}" stroke="#0a0c10" stroke-width="1.5"/>`;
    if(labels){ const lc=hi[m]?'#0a0c10':'#6b7382';
      svg+=`<text x="${xOf[m]+whiteW/2}" y="${whiteH-12}" text-anchor="middle" font-size="12" font-weight="700" fill="${lc}" pointer-events="none">${SHARP[m%12]}</text>`;}
  });
  // black keys
  for(let m=low;m<=high;m++){ if([1,3,6,8,10].indexOf(m%12)>=0){
    // position: between the white key below and the one above
    const wb=m-1; // white below (since black is always above a white that is m-1 for these pcs)
    let bx = xOf[wb]!=null ? xOf[wb]+whiteW-blackW/2 : null;
    if(bx==null) continue;
    const c=hi[m]?colMap[hi[m]]:'#13161c';
    svg+=`<rect class="pkey" data-m="${m}" x="${bx}" y="1" width="${blackW}" height="${blackH}" rx="4"
      fill="${c}" stroke="#0a0c10" stroke-width="1.5"/>`;
    if(labels&&hi[m]){ svg+=`<text x="${bx+blackW/2}" y="${blackH-10}" text-anchor="middle" font-size="9" font-weight="700" fill="#0a0c10" pointer-events="none">${SHARP[m%12]}</text>`;}
  }}
  svg+='</svg>';
  const div=document.createElement('div'); div.innerHTML=svg;
  const el=div.firstChild;
  el.querySelectorAll('.pkey').forEach(k=>{
    k.addEventListener('click',ev=>{
      const m=+k.dataset.m; Audio_.note(m,0.9);
      const r=k.getBoundingClientRect(); showPop(SHARP[m%12],r.left+r.width/2,r.top);
      if(opts.onClick) opts.onClick(m);
    });
  });
  return el;
}

/* ---- PITCH CLOCK ---- instrument-agnostic chromatic circle
   opts:{highlight:{pc:colorKey}, shape:[pc...] (draw polygon), root:pc, labels, onClick, pref} */
function Clock(opts={}){
  const size=260, cx=size/2, cy=size/2, R=98, r=24;
  const hi=opts.highlight||{}; const pref=opts.pref||'sharp';
  const colMap={root:'var(--root)',hi:'var(--hi)',hi2:'var(--hi2)',hi3:'var(--hi3)'};
  const ang=pc=> (pc/12)*2*Math.PI - Math.PI/2;
  const px=pc=>cx+R*Math.cos(ang(pc)), py=pc=>cy+R*Math.sin(ang(pc));
  let svg=`<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="var(--line)" stroke-width="1.5"/>`;
  // shape polygon
  if(opts.shape&&opts.shape.length>1){
    let pts=opts.shape.map(pc=>`${px(pc).toFixed(1)},${py(pc).toFixed(1)}`).join(' ');
    svg+=`<polygon points="${pts}" fill="rgba(110,168,255,.13)" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>`;
  }
  for(let pc=0;pc<12;pc++){
    const x=px(pc),y=py(pc);
    const on=hi[pc];
    const fill=on?colMap[on]:'var(--bg3)';
    const tc=on?'#0a0c10':'var(--dim)';
    svg+=`<g class="tcell" data-pc="${pc}">
      <circle cx="${x}" cy="${y}" r="${r}" fill="${fill}" stroke="var(--line)" stroke-width="1.5"/>
      <text x="${x}" y="${y+4.5}" text-anchor="middle" font-size="12.5" font-weight="700" fill="${tc}" pointer-events="none">${pcName(pc,pref)}</text></g>`;
  }
  svg+='</svg>';
  const div=document.createElement('div'); div.innerHTML=svg; const el=div.firstChild;
  el.style.maxWidth='300px'; el.style.margin='0 auto';
  if(!opts.static){ el.querySelectorAll('.tcell').forEach(g=>{
    g.addEventListener('click',()=>{ const pc=+g.dataset.pc; Audio_.note(60+pc,0.9);
      if(opts.onClick) opts.onClick(pc); });
  }); }
  return el;
}

/* play button helper */
function PlayBtn(label,fn,cls=''){ const b=document.createElement('button');
  b.className='btn '+cls; b.innerHTML='▶ '+label; b.onclick=()=>fn(b); return b; }

/* ============================================================
   BLOCK RENDERER  — turns lesson data into DOM
   ============================================================ */
function el(tag,cls,html){ const e=document.createElement(tag); if(cls)e.className=cls;
  if(html!=null)e.innerHTML=html; return e; }

function renderBlock(b){
  switch(b.t){
    case 'h': return el('h3',null,b.x);
    case 'p': return el('p',null,b.x);
    case 'ul':{ const u=el('ul'); b.x.forEach(li=>u.appendChild(el('li',null,li))); return u; }
    case 'note': return el('div','callout'+(b.k?' '+b.k:''),b.x);
    case 'widget':{
      const w=el('div','widget');
      if(b.label) w.appendChild(el('div','wlabel',b.label));
      const body=b.build(); if(body) w.appendChild(body);
      if(b.hint) w.appendChild(el('div','whint',b.hint));
      return w;
    }
    case 'custom': return b.build();
    default: return el('p',null,b.x||'');
  }
}

/* ============================================================
   QUIZ ENGINE
   ============================================================ */
function renderQuiz(quiz, lessonId, onPass){
  const wrap=el('div','quiz'); let i=0, correct=0, answered=false;
  const card=el('div','qcard'); wrap.appendChild(card);
  function draw(){
    answered=false; card.innerHTML='';
    if(i>=quiz.questions.length){ finish(); return; }
    const q=quiz.questions[i];
    card.appendChild(el('div','qprog',`Question ${i+1} of ${quiz.questions.length}`));
    const bar=el('div','qbar'); bar.appendChild(el('i')); card.appendChild(bar);
    bar.firstChild.style.width=(i/quiz.questions.length*100)+'%';
    card.appendChild(el('div','qq',q.q));
    if(q.sub) card.appendChild(el('div','qsub',q.sub));
    if(q.build){ const extra=q.build(); if(extra) card.appendChild(extra); }
    const opts=[];
    q.options.forEach((opt,idx)=>{
      const o=el('button','opt',opt); card.appendChild(o); opts.push(o);
      o.onclick=()=>{
        if(answered) return; answered=true;
        const isC=idx===q.answer;
        if(isC){ correct++; o.classList.add('correct'); }
        else { o.classList.add('wrong'); opts[q.answer].classList.add('correct'); }
        opts.forEach((oo,j)=>{ if(j!==idx&&j!==q.answer) oo.classList.add('dim'); oo.disabled=true; });
        const fb=el('div','feedback show '+(isC?'ok':'no'),
          (isC?'<b>Correct.</b> ':'<b>Not quite.</b> ')+(q.why||''));
        card.appendChild(fb);
        const nb=el('button','btn','Next →'); nb.style.marginTop='12px';
        nb.onclick=()=>{ i++; draw(); }; card.appendChild(nb);
      };
    });
  }
  function finish(){
    const pct=Math.round(correct/quiz.questions.length*100);
    const passed=pct>=70;
    Progress.score(lessonId,pct);
    card.innerHTML='';
    const r=el('div','result');
    r.appendChild(el('div','big '+(passed?'':'') , pct+'%'));
    r.appendChild(el('div','lbl',`${correct} of ${quiz.questions.length} correct`));
    r.appendChild(el('p',null, passed
      ? '🎉 Nicely done — you\'ve got this material.'
      : 'Worth another pass. Review the lesson and try again — you need 70% to mark it complete.'));
    const row=el('div','btnrow');
    const again=el('button','btn sec','Try again'); again.onclick=()=>{i=0;correct=0;draw();};
    row.appendChild(again);
    if(passed){ const cont=el('button','btn','Continue'); cont.onclick=()=>onPass&&onPass(); row.appendChild(cont); }
    r.appendChild(row); card.appendChild(r);
    if(passed) onPass&&onPass(true);
  }
  draw();
  return wrap;
}

/* ============================================================
   ROUTER / VIEWS
   ============================================================ */
const App=document.getElementById('app');
const Bar=document.getElementById('barTitle');
const BackBtn=document.getElementById('backBtn');
const Fnav=document.getElementById('fnav');
const FnavInner=document.getElementById('fnavInner');
let route={view:'home'};

function totalLessons(){ let n=0; COURSE.forEach(m=>n+=m.lessons.length); return n; }
function doneCount(){ let n=0; COURSE.forEach(m=>m.lessons.forEach(l=>{ if(Progress.done(l.id))n++;})); return n; }
function moduleDone(m){ return m.lessons.every(l=>Progress.done(l.id)); }
function moduleProg(m){ const d=m.lessons.filter(l=>Progress.done(l.id)).length; return d/m.lessons.length; }
function updatePct(){ document.getElementById('barPct').textContent=Math.round(doneCount()/totalLessons()*100)+'%'; }

function go(r){ route=r; window.scrollTo(0,0); render();
  history.replaceState(r,'', '#'+(r.view==='home'?'':r.view+(r.m!=null?'-'+r.m:'')+(r.l!=null?'-'+r.l:''))); }

function render(){
  updatePct();
  App.innerHTML=''; App.className='wrap fade';
  Fnav.classList.add('hidden');
  if(route.view==='home'){ BackBtn.style.display='none'; renderHome(); }
  else if(route.view==='module'){ BackBtn.style.display='block'; BackBtn.onclick=()=>go({view:'home'}); renderModule(route.m); }
  else if(route.view==='lesson'){ BackBtn.style.display='block'; BackBtn.onclick=()=>go({view:'module',m:route.m}); renderLesson(route.m,route.l); }
  else if(route.view==='practice'){ BackBtn.style.display='block'; BackBtn.onclick=()=>go({view:'home'}); renderPractice(); }
  else if(route.view==='drill'){ BackBtn.style.display='block'; BackBtn.onclick=()=>go({view:'practice'}); renderDrillView(route.skill); }
  else if(route.view==='session'){ BackBtn.style.display='block'; BackBtn.onclick=()=>go({view:'practice'}); renderSession(); }
}

function renderHome(){
  Bar.innerHTML='<span class="brand">THEORY<b>.</b></span>';
  const hero=el('div','hero');
  hero.appendChild(el('h1','','Music Theory'));
  hero.appendChild(el('p','','The recipes behind music — sounds, shapes, and the logic underneath. Tap any tile to begin.'));
  App.appendChild(hero);
  // Practice hub entry
  const anyUnlocked=SKILLS.some(skillUnlocked);
  if(anyUnlocked){ const avg=SKILLS.filter(skillUnlocked).reduce((a,s)=>a+Mastery.level(s.id),0);
    const card=el('div','praccard');
    card.innerHTML='<div class="pic">🎯</div><div class="pi"><h3>Practice</h3><p>Adaptive drills &amp; ear training — the app picks what you need</p></div><div class="chev">›</div>';
    card.onclick=()=>go({view:'practice'}); App.appendChild(card);
  }
  let curTrack=null;
  COURSE.forEach((m,mi)=>{
    if(m.track!==curTrack){ curTrack=m.track; App.appendChild(el('div','track-h',curTrack)); }
    const done=moduleDone(m), prog=moduleProg(m);
    const row=el('div','mod'+(done?' done':''));
    row.innerHTML=`<div class="num">${done?'✓':m.n}</div>
      <div class="mi"><h3>${m.title}</h3><p>${m.blurb}</p>
        <div class="mbar"><i style="width:${prog*100}%"></i></div></div>
      <div class="chev">›</div>`;
    row.onclick=()=>go({view:'module',m:mi});
    App.appendChild(row);
  });
  const foot=el('div'); foot.style.cssText='color:var(--faint);font-size:.8rem;text-align:center;margin:24px 0;';
  foot.innerHTML='Progress is saved on this device. The <b style="color:var(--accent2)">Practice</b> tab up top runs adaptive drills and ear training that the app picks for you — that\'s where the repetition happens.';
  App.appendChild(foot);
}

function renderModule(mi){
  const m=COURSE[mi]; Bar.innerHTML=`Module ${m.n}`;
  const h=el('div','hero'); h.appendChild(el('h1','',m.title));
  h.appendChild(el('p','',m.intro)); App.appendChild(h);
  const lh=el('div','track-h','Lessons'); App.appendChild(lh);
  m.lessons.forEach((l,li)=>{
    const done=Progress.done(l.id);
    const row=el('div','lesson-row'+(done?' done':'')+(l.quiz?' kind-quiz':''));
    const sc=Progress.get(l.id);
    row.innerHTML=`<div class="dot">${done?'✓':(li+1)}</div>
      <div class="lt"><b>${l.title}</b><span>${l.quiz?'Quiz':'Lesson'}${sc&&sc.score!=null?' · '+sc.score+'%':''} · ${l.mins||3} min</span></div>
      <div class="chev">›</div>`;
    row.onclick=()=>go({view:'lesson',m:mi,l:li});
    App.appendChild(row);
  });
}

function renderLesson(mi,li){
  const m=COURSE[mi]; const l=m.lessons[li];
  Bar.innerHTML=`${m.title}`;
  const wrap=el('div','lesson');
  wrap.appendChild(el('div','eyebrow',`Module ${m.n} · ${l.quiz?'Quiz':'Lesson '+(li+1)}`));
  wrap.appendChild(el('h2','',l.title));
  App.appendChild(wrap);

  if(l.quiz){
    const q=renderQuiz(l.quiz, l.id, (auto)=>{ if(auto){ Progress.mark(l.id,true); updatePct(); }
      else { go({view:'module',m:mi}); } });
    wrap.appendChild(q);
    return;
  }
  // normal lesson
  (l.blocks||[]).forEach(b=>{ try{ wrap.appendChild(renderBlock(b)); }catch(e){ console.error(e);} });

  // footer nav: prev / mark done+next
  Fnav.classList.remove('hidden');
  FnavInner.innerHTML='';
  const markBtn=el('button','btn', Progress.done(l.id)?'✓ Completed — Next →':'Mark complete →');
  markBtn.onclick=()=>{ Progress.mark(l.id,true); updatePct();
    if(li+1<m.lessons.length) go({view:'lesson',m:mi,l:li+1});
    else go({view:'module',m:mi}); };
  if(li>0){ const pv=el('button','btn ghost','‹ Prev'); pv.style.flex='0 0 auto';
    pv.onclick=()=>go({view:'lesson',m:mi,l:li-1}); FnavInner.appendChild(pv); }
  FnavInner.appendChild(markBtn);
}

/* boot after COURSE defined */
window.addEventListener('load',()=>{ render(); });
</script>

<script>
"use strict";
/* ============================================================
   INTERACTIVE CONTENT BUILDERS (used inside lessons)

/* generic selectable chip row */
function chipRow(items, sel, onSel, cls=''){ const row=el('div','chips');
  items.forEach((it,i)=>{ const c=el('button','chip'+(cls?' '+cls:'')+(i===sel?(cls?' on2':' on'):''),it.label);
    c.onclick=()=>{ row.querySelectorAll('.chip').forEach(x=>x.classList.remove('on','on2'));
      c.classList.add(cls?'on2':'on'); onSel(it.val,i); }; row.appendChild(c); });
  return row; }

/* ---- Interval builder: root + interval -> show & play ---- */
function intervalBuilder(){
  const box=el('div'); let root=0, st=7; // C, P5
  const display=el('div'); const info=el('div','whint');
  const roots=[0,2,4,5,7,9,11].map(pc=>({label:SHARP[pc],val:pc}));
  box.appendChild(el('div','wlabel','1 · Pick a starting note'));
  box.appendChild(chipRow(roots, 0, v=>{root=v;upd();}));
  box.appendChild(el('div','wlabel','2 · Pick an interval'));
  const ivs=INTERVALS.slice(1).map(iv=>({label:iv.sh,val:iv.st}));
  box.appendChild(chipRow(ivs, 6, v=>{st=v;upd();},'iv')); // default P5 (index of st7 -> in slice from st1, P5 is index 6)
  box.appendChild(display);
  const row=el('div','btnrow');
  row.appendChild(PlayBtn('Hear it',()=>{ Audio_.interval(60+root,60+root+st); }));
  box.appendChild(row);
  box.appendChild(info);
  function upd(){ const iv=INTERVALS.find(x=>x.st===st);
    const hi={}; hi[root]='root'; hi[(root+st)%12]='hi';
    display.innerHTML=''; const c=Clock({highlight:hi,shape:[root,(root+st)%12]}); display.appendChild(c);
    const a=SHARP[root], b=SHARP[(root+st)%12];
    info.innerHTML=`<b>${a} → ${b}</b> &nbsp;·&nbsp; ${iv.name} &nbsp;·&nbsp; ${st} half step${st===1?'':'s'} &nbsp;·&nbsp; <span style="color:var(--accent2)">${iv.col}</span>`;
  }
  upd(); return box;
}

/* ---- Half / whole step explorer ---- */
function stepExplorer(){
  const box=el('div'); let root=0;
  const out=el('div','whint');
  box.appendChild(el('div','wlabel','Pick a note, then hear a half step and a whole step up'));
  const roots=SHARP.map((n,pc)=>({label:n,val:pc}));

/* ---- Octave / frequency demo ---- */

/* ---- Consonance spectrum: play each interval, see its rating ---- */

/* ---- ratio table demo ---- */
function ratioDemo(){
  const box=el('div'); box.appendChild(el('div','wlabel','Simple frequency ratios = stable sound. Tap to compare.'));
  const data=[['Octave','2 : 1',12],['Perfect 5th','3 : 2',7],['Perfect 4th','4 : 3',5],['Major 3rd','5 : 4',4],['Minor 2nd','16 : 15',1],['Tritone','45 : 32',6]];
  const list=el('div'); list.style.cssText='display:flex;flex-direction:column;gap:7px;';

/* ---- Circle of fifths ---- */
function circleOfFifths(){
  const box=el('div'); box.appendChild(el('div','wlabel','Each step clockwise adds a sharp; counter-clockwise adds a flat. Tap a key to hear its scale.'));
  const size=300,cx=150,cy=150,R=118,r=27;
  const ang=i=>(i/12)*2*Math.PI - Math.PI/2;
  let svg=`<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="var(--line)" stroke-width="1.5"/>`;
  CIRCLE.forEach((k,i)=>{ const x=cx+R*Math.cos(ang(i)), y=cy+R*Math.sin(ang(i));
    const sig=KEYSIG[k], typ=KEYSIGTYPE[k];
    const label=sig===0?'0':sig+typ;
    svg+=`<g class="tcell" data-k="${k}"><circle cx="${x}" cy="${y}" r="${r}" fill="var(--bg3)" stroke="var(--line)" stroke-width="1.5"/>
      <text x="${x}" y="${y-2}" text-anchor="middle" font-size="14" font-weight="800" fill="var(--txt)" pointer-events="none">${k}</text>
      <text x="${x}" y="${y+12}" text-anchor="middle" font-size="9" fill="var(--faint)" pointer-events="none">${label}</text></g>`;
  });
  svg+=`<text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="11" fill="var(--faint)">CIRCLE OF</text>
        <text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="13" font-weight="700" fill="var(--dim)">FIFTHS</text></svg>`;
  const d=el('div'); d.innerHTML=svg; const s=d.firstChild; s.style.maxWidth='320px'; s.style.margin='0 auto';
  const info=el('div','whint','Tap a key.');
  s.querySelectorAll('.tcell').forEach(g=>{ g.addEventListener('click',()=>{ const k=g.dataset.k;
    const root=NAT[k[0]]+(k[1]==='#'?1:k[1]==='b'?-1:0); const midis=buildScale(60+((root%12)+12)%12,'major');
    Audio_.seq(midis,0.36,0.36);
    const sig=KEYSIG[k],typ=KEYSIGTYPE[k];
    info.innerHTML=`<b>${k} major</b> — ${sig===0?'no sharps or flats':sig+' '+(typ==='#'?'sharp':'flat')+(sig>1?'s':'')}`;
  });});
  box.appendChild(s); box.appendChild(info); return box;
}

/* ============================================================
   PRACTICE DRILL ENGINE — randomized, replayable, streak-tracked
   ============================================================ */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function pickN(arr,n){ return shuffle(arr).slice(0,n); }
function randInt(n){ return Math.floor(Math.random()*n); }

function Drill(cfg){
  const box=el('div','drill'); const BKEY='theory_drill_'+(cfg.id||'x');
  let streak=0, best=+(localStorage.getItem(BKEY)||0), answered=false, q=null;
  const head=el('div','drill-head');
  head.innerHTML='<span class="drill-badge">PRACTICE</span><span class="drill-score"></span>';
  box.appendChild(head);
  if(cfg.intro) box.appendChild(el('div','drill-intro',cfg.intro));
  if(cfg.controls) box.appendChild(cfg.controls);
  const stage=el('div','drill-stage'); box.appendChild(stage);
  const choices=el('div','drill-choices'); box.appendChild(choices);
  const fb=el('div','feedback'); box.appendChild(fb);
  const ctrl=el('div','btnrow'); box.appendChild(ctrl);
  function setScore(){ head.querySelector('.drill-score').innerHTML='Streak: <b>'+streak+'</b> &nbsp;·&nbsp; Best: <b>'+best+'</b>'; }
  function newQ(){
    answered=false; q=cfg.make(); stage.innerHTML=''; choices.innerHTML=''; ctrl.innerHTML=''; fb.className='feedback';
    if(q.prompt) stage.appendChild(typeof q.prompt==='string'?el('div','drill-prompt',q.prompt):q.prompt);
    if(q.play) stage.appendChild(PlayBtn((cfg.playLabel||'Play').replace(/^▶ ?/,''),()=>q.play()));
    if(q.choices.length%2===1) choices.style.gridTemplateColumns='1fr'; else choices.style.gridTemplateColumns='1fr 1fr';
    q.choices.forEach((c,i)=>{ const b=el('button','opt',c); choices.appendChild(b);
      b.onclick=()=>{ if(answered) return; answered=true; const ok=(i===q.answer);
        if(ok){ b.classList.add('correct'); streak++; if(streak>best){ best=streak; localStorage.setItem(BKEY,best); } }
        else { b.classList.add('wrong'); choices.children[q.answer].classList.add('correct'); streak=0; }
        Array.prototype.forEach.call(choices.children,(bb,j)=>{ if(j!==i&&j!==q.answer) bb.classList.add('dim'); bb.disabled=true; });
        setScore();
        fb.className='feedback show '+(ok?'ok':'no'); fb.innerHTML=(ok?'<b>Correct.</b> ':'<b>Not quite.</b> ')+(q.why||'');
        if(q.play) ctrl.appendChild(PlayBtn('Replay',()=>q.play(),'sec'));
        const nx=el('button','btn','Next →'); nx.onclick=newQ; ctrl.appendChild(nx);
      };
    });
  }
  setScore(); newQ();
  return box;
}

    {t:'p',x:'Every interval name has two parts: a <b>number</b> and a <b>quality</b>. The <b>number</b> counts letter names from the bottom note to the top, <i>including both ends</i>. C up to E spans C-D-E — three letters — so it\'s some kind of "3rd". C up to G spans C-D-E-F-G — five letters — a "5th". The number ignores sharps and flats; it only counts letters.'},

    {q:'How many half steps are in a Perfect 5th?',
     options:['5','6','7','8'], answer:2, why:'A perfect 5th = 7 half steps. C up to G.'},
    {q:'What\'s the difference between a major 3rd and a minor 3rd?',
     options:['One half step — major is bigger and brighter','A whole octave','Nothing, they\'re the same','The major 3rd is lower'],
     answer:0, why:'M3 = 4 half steps (bright), m3 = 3 (darker). That single half step flips a chord between happy and sad.'},
    {q:'Which interval is the MOST consonant (most stable)?',
     options:['Minor 2nd','Tritone','Octave','Major 7th'], answer:2,
     why:'The octave, ratio 2:1, is the most consonant interval — so stable it sounds like the same note.'},
    {q:'Consonance comes mainly from…',
     options:['Simple frequency ratios','The color of the instrument','How loud the notes are','Cultural habit alone'],
     answer:0, why:'Simple ratios (2:1, 3:2, 5:4) make waves align and fuse. They\'re also present in the natural overtone series.'},
    {q:'A Perfect 5th (7 half steps) inverted becomes…',
     options:['Another 5th','A Perfect 4th (5)','A major 3rd (4)','An octave'], answer:1,
     why:'Inversions sum to 12: 7 + 5 = 12, so a 5th inverts to a 4th.'},
    {q:'Listen — name this interval.', sub:'Played low then high. Tap play.',
     build:()=>earQ(()=>Audio_.interval(60,67,0.7,0.6)),
     options:['Minor 2nd','Major 3rd','Perfect 5th','Octave'], answer:2,
     why:'That was C→G, a perfect 5th — that hollow, open, "Star Wars" sound.'},
    {q:'Listen — bright or dark? Name it.', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.interval(60,63,0.7,0.6)),
     options:['Major 3rd (bright)','Minor 3rd (dark)','Perfect 4th','Tritone'], answer:1,
     why:'That was C→E♭, a minor 3rd — the darker, more wistful of the two thirds.'},
    {q:'Listen — this tense, restless interval is the…', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.interval(60,66,0.7,0.6)),
     options:['Octave','Perfect 5th','Tritone','Major 2nd'], answer:2,
     why:'That was the tritone (6 half steps) — maximally unstable, the "Simpsons" leap. It badly wants to resolve.'},
  ]}},
]},

/* ---------- MODULE 3 ---------- */
{ n:3, track:'Core Track', title:'Scales & Keys',
  blurb:'Recipes of steps, and the gravity of a key',
  intro:'A scale is a fixed pattern of whole and half steps. A key is the gravitational field a piece lives in. Same pattern, any starting note — that\'s every key there is.',
  lessons:[
  { id:'m3l1', title:'The Major Scale', mins:5, blocks:[
    {t:'p',x:'A <span class="term">scale</span> is a recipe: a fixed pattern of whole and half steps that you can start on any note. The most important one is the <b>major scale</b> — the familiar "do re mi fa sol la ti do" that sounds bright and complete.'},
    {t:'p',x:'Its pattern, in whole (W) and half (H) steps, is:'},
    {t:'note',x:'<b style="color:var(--accent2);font-size:1.05rem;letter-spacing:1px;">W – W – H – W – W – W – H</b><br>Start on any note, follow that exact sequence of steps, and you\'ve built a major scale. The two half steps (after the 3rd note and after the 7th) are what give it that bright, resolved, "coming home" sound.'},
    {t:'p',x:'Start on C and follow the recipe and you get <b>C D E F G A B C</b> — all white keys, no sharps or flats. That\'s not a coincidence: the white keys <i>are</i> C major. The uneven spacing you learned in Module 1 (those E–F and B–C half steps) is precisely the W-W-H-W-W-W-H pattern.'},
    {t:'widget',label:'Build & hear any major scale',build:()=>scaleBuilder('major'),
      hint:'Keep it on Major and change the root. The shape on the clock stays identical — it just rotates. That rotating shape IS the scale; the starting note just names the key.'},
    {t:'note',k:'code',x:'// Procedural lens: a scale is a step-pattern.\n// major = [2,2,1,2,2,2,1]  (half steps)\n// notes = scan-add from root, mod 12.\n// Rotating the start note = transposing to a new key.'},
    {t:'h',x:'Practice: spell the scale'},
    {t:'p',x:'The quiz expects you to actually know the notes of a scale, and that only comes from doing it — so here is a drill for exactly that. It names a key and asks for a specific note of its major scale. It also lives in the <b>Practice</b> tab and feeds your mastery score.'},
    {t:'custom',build:()=>skillDrill('scale-spell',{intro:'Apply W-W-H-W-W-W-H from the named root to find the answer.'})},
  ]},
  { id:'m3l2', title:'Minor Scales', mins:5, blocks:[
    {t:'p',x:'If major is bright, <span class="term">minor</span> is its shadow — darker, more serious or melancholy. The key difference is a <b>flatter 3rd</b> (that major-vs-minor 3rd from Module 2, now built into the whole scale).'},
    {t:'p',x:'There are three minor scales. They share the same first five notes and differ only near the top:'},
    {t:'ul',x:[
      '<b>Natural minor</b> — W H W W H W W. The pure, plain minor sound. (It\'s also the white keys starting from A.)',
      '<b>Harmonic minor</b> — raises the 7th note, creating a strong pull back to the root (and an exotic gap near the top).',
      '<b>Melodic minor</b> — raises the 6th and 7th going up, for a smoother climb; often reverts to natural coming down.'
    ]},
    {t:'widget',label:'Compare the minor scales',build:()=>scaleBuilder('natminor'),
      hint:'Switch between the three minor types on the same root and listen to the top of each. Harmonic minor\'s raised 7th gives that dramatic, almost Spanish flavour.'},
    {t:'note',x:'<b>Relative vs parallel.</b> A minor and C major use the exact same notes — they\'re <i>relative</i> (same notes, different home base). A minor and A major start on the same note but differ — they\'re <i>parallel</i>. Both relationships become powerful tools later for borrowing color between scales.'},
    {t:'note',k:'phys',x:'<b>Why the three minors exist.</b> Natural minor sounds great melodically but its 7th note sits a whole step below the root, so it doesn\'t "pull home" strongly. Harmonic minor raises that 7th to fix the harmony; melodic minor also raises the 6th to smooth out the awkward gap that creates. They\'re practical fixes, not arbitrary variants.'},
    {t:'h',x:'Practice: major or minor?'},
    {t:'p',x:'Telling major from minor by ear is the most useful single skill at this stage — the difference between bright and dark, happy and sad, in almost everything you hear. Start on <b>Learn</b> to soak in the two sounds, then test yourself. (Also in the <b>Practice</b> tab.)'},
    {t:'custom',build:()=>majMinLadder()},
  ]},
  { id:'m3l3', title:'Keys & Key Signatures', mins:7, blocks:[
    {t:'p',x:'A <span class="term">key</span> is the gravitational field a piece lives in: one note — the <span class="term">tonic</span> — feels like "home", and the major (or minor) scale built on that tonic supplies the notes that belong. "In the key of G major" simply means G is home and the music draws on the G major scale. That\'s the whole idea of a key; the rest of this lesson is about one practical consequence of it.'},
    {t:'h',x:'Where key signatures come from'},
    {t:'p',x:'Here is the key insight, built up slowly. A major scale is <i>always</i> the pattern W-W-H-W-W-W-H. C major happens to fit that pattern using only white keys (C D E F G A B), so it needs no sharps or flats. But what about starting on a different note?'},
    {t:'p',x:'Try building <b>G major</b>. Start on G and lay down W-W-H-W-W-W-H: G, A, B, C, D, E, and then… the 7th step needs to be a whole step above E, which is F♯ — not F. If you played a plain F here, the step from E to F would be only a half step and the step F to G a whole step, and the pattern would be wrong: it simply wouldn\'t sound like a major scale. So <b>G major is forced to use F♯</b>. There\'s no choice involved — the major pattern demands it.'},
    {t:'p',x:'That forced note is the whole point. Rather than write a ♯ next to every single F in the music, we declare once at the start: "this piece is in G major, so every F is sharp." That standing declaration — the fixed set of sharps or flats a key always uses — is its <span class="term">key signature</span>. G major\'s signature is one sharp (F♯). C major\'s is empty.'},
    {t:'widget',label:'See the forced notes for yourself',build:()=>keySignatureBuilder(),
      hint:'Step through the keys. Each one keeps the previous key\'s sharps and is forced to add exactly one more. That "+1 sharp each step" is not a coincidence — it\'s the seed of the Circle of Fifths on the next screen.'},
    {t:'note',x:'<b>Why they accumulate by one.</b> Going from C to G to D to A, each new key starts a fifth higher and needs exactly one new sharp while keeping all the old ones (G adds F♯; D keeps F♯ and adds C♯; A keeps both and adds G♯). Flats work the same way going the other direction. Memorising every signature is unnecessary once you see they\'re generated by this simple, regular process.'},
    {t:'h',x:'Practice: key signatures'},
    {t:'p',x:'A drill for the recall the quiz expects — how many sharps or flats a given key has. It starts with the common keys and widens out, and lives in the <b>Practice</b> tab too.'},
    {t:'custom',build:()=>skillDrill('key-sig',{intro:'How many sharps or flats does the named key have? Starts easy, widens as you go.'})},
  ]},
  { id:'m3l4', title:'The Circle of Fifths', mins:6, blocks:[
    {t:'p',x:'The <span class="term">Circle of Fifths</span> is just the previous lesson\'s discovery drawn as a clock. Put C at the top (no sharps or flats) and move clockwise: each step goes up a perfect 5th and adds exactly one sharp — G (1♯), D (2♯), A (3♯), and so on. Move counter-clockwise from C and each step adds a flat — F (1♭), B♭ (2♭), E♭ (3♭)… The two directions meet at the bottom. That\'s all the circle <i>is</i>: every key arranged by how many sharps or flats it has.'},
    {t:'p',x:'But its real value is the three concrete jobs it does for you:'},
    {t:'ul',x:[
      '<b>1 · Look up any key\'s signature at a glance.</b> The number on each key tells you its sharps or flats, so you never have to rebuild the scale by hand.',
      '<b>2 · See which keys are closely related.</b> Neighbours on the circle differ by just one note (they share six of seven), so they sound like close cousins. This is what you reach for when borrowing chords or changing key.',
      '<b>3 · Explain why 5ths organise everything.</b> The circle is generated by stacking perfect 5ths — the most consonant interval after the octave — and twelve of them visit all twelve notes before returning home.'
    ]},
    {t:'widget',label:'Explore the circle',build:()=>circleExplorer(),
      hint:'Tap any key: it plays the scale, spells out its exact sharps or flats, and lights up its two nearest neighbours — the keys it\'s most closely related to.'},
    {t:'note',x:'<b>Closeness on the circle = similarity in sound.</b> Keys next to each other share almost all their notes, so moving between them feels smooth; keys on opposite sides share few notes and feel like a dramatic shift. Hold onto this — it is exactly what makes some key changes feel seamless and others feel like a jolt, which is the heart of modulation in Module 9.'},
    {t:'p',x:'You don\'t need to memorise the whole wheel today. The takeaway: keys are not a random list but a connected map, and distance on that map predicts how related two keys sound. We\'ll lean on it constantly once chords start moving between keys.'},
  ]},
  { id:'m3q', title:'Module 3 Quiz', mins:6, quiz:{ questions:[
    {q:'What is the step pattern of the major scale?',
     options:['W W W H W W H','W H W W H W W','W W H W W W H','H W W H W W W'], answer:2,
     why:'W-W-H-W-W-W-H. The two half steps (after the 3rd and 7th notes) give major its bright, resolved sound.'},
    {q:'Which key has no sharps or flats?',
     options:['G major','C major','F major','D major'], answer:1,
     why:'C major is all white keys — its scale already matches W-W-H-W-W-W-H with no accidentals.'},
    {q:'A minor and C major contain the same notes. They are called…',
     options:['Parallel keys','Relative keys','Enharmonic keys','Identical keys'], answer:1,
     why:'Same notes, different tonic = relative keys. (Same tonic, different notes would be parallel.)'},
    {q:'On the circle of fifths, moving one step clockwise…',
     options:['Adds one flat','Adds one sharp','Changes nothing','Jumps an octave'], answer:1,
     why:'Clockwise = up a perfect 5th = add one sharp (C→G→D…). Counter-clockwise adds flats.'},
    {q:'What mainly separates a minor scale from a major scale?',
     options:['A flatter (lowered) 3rd','A higher tonic','More notes overall','A faster tempo'], answer:0,
     why:'The lowered 3rd is the core of the minor sound — the same M3-vs-m3 contrast from Module 2, built into the scale.'},
    {q:'Listen — is this scale major or minor?', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.seq(buildScale(60,'major'),0.34,0.34)),
     options:['Major','Minor'], answer:0,
     why:'That was C major ascending — bright and resolved, ending with a satisfying "arrival" at the octave.'},
    {q:'Listen — major or minor?', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.seq(buildScale(60,'natminor'),0.34,0.34)),
     options:['Major','Minor'], answer:1,
     why:'That was C natural minor — the lowered 3rd, 6th and 7th give it that darker, more serious color.'},
    {q:'Listen — which minor scale is this? (Note the dramatic gap near the top.)', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.seq(buildScale(60,'harmonicminor'),0.34,0.34)),
     options:['Natural minor','Harmonic minor','Melodic minor','Major'], answer:1,
     why:'Harmonic minor — the raised 7th creates that big, exotic leap near the top and a strong pull home.'},
  ]}},
]},

/* ---------- MODULE 4 ---------- */
{ n:4, track:'Core Track', title:'Chord Construction',
  blurb:'Stacking intervals into triads and beyond',
  intro:'A chord is intervals stacked from a scale. Learn the four triads and the 7th chords, and you can build or name almost any chord you meet.',
  lessons:[
  { id:'m4l1', title:'Triads — the Four Flavors', mins:5, blocks:[
    {t:'p',x:'A <span class="term">triad</span> is a three-note chord built by stacking two 3rds. Take a root, skip up a 3rd, skip up another 3rd. Which <i>kind</i> of 3rd you stack (major = 4 half steps, minor = 3) decides the chord\'s entire personality — exactly the major/minor 3rd you met in Module 2.'},
    {t:'p',x:'There are four ways to combine those two thirds, giving the four triad types:'},
    {t:'ul',x:[
      '<b>Major</b> = major 3rd + minor 3rd (root, +4, +7). Bright, happy, resolved.',
      '<b>Minor</b> = minor 3rd + major 3rd (root, +3, +7). Dark, sad, serious.',
      '<b>Diminished</b> = minor 3rd + minor 3rd (root, +3, +6). Tense, unstable, anxious.',
      '<b>Augmented</b> = major 3rd + major 3rd (root, +4, +8). Strange, dreamlike, suspended.'
    ]},
    {t:'note',x:'<b>The whole game is the 3rd.</b> Major and minor triads share the same root and 5th — only the middle note moves by one half step. That single note is the difference between joy and sorrow in music. Everything else is coloring on top.'},
    {t:'widget',label:'Build any chord',build:()=>chordBuilder(),
      hint:'Start by flipping between Major and Minor on the same root — listen to that one note move. Then try Diminished (notice the unease) and Augmented (notice it can\'t sit still).'},
    {t:'note',k:'code',x:'// Procedural lens: a chord is a set of offsets from a root.\n// major = [0,4,7]   minor = [0,3,7]\n// dim   = [0,3,6]   aug   = [0,4,8]\n// Transpose = add the root midi number to every offset.'},
    {t:'h',x:'Practice: name the chord quality'},
    {t:'p',x:'Hearing a chord and instantly knowing its quality is a core skill for figuring out songs and writing your own. Begin on <b>Learn</b> to fix the four sounds in your ear, then test yourself; the difficulty widens to include 7th chords as your mastery climbs. (Also in the <b>Practice</b> tab.)'},
    {t:'custom',build:()=>chordEarLadder()},
  ]},
  { id:'m4l2', title:'7th Chords & Extensions', mins:5, blocks:[
    {t:'p',x:'Keep stacking 3rds past the triad and you add <b>color</b>. Add one more 3rd on top of a triad and you get a <span class="term">7th chord</span> — four notes, a richer and more sophisticated sound. These are the backbone of jazz, soul, and most film music.'},
    {t:'ul',x:[
      '<b>Major 7th</b> (maj7) — lush, dreamy, warm. A major triad + a major 7th on top.',
      '<b>Minor 7th</b> (m7) — smooth, mellow, jazzy. A minor triad + a minor 7th.',
      '<b>Dominant 7th</b> (7) — bluesy and <i>restless</i>; it badly wants to resolve. A major triad + a minor 7th. This is the engine of tension in harmony.'
    ]},
    {t:'widget',label:'Hear the 7th chords',build:()=>chordBuilder(),
      hint:'Switch to maj7, m7, and dom7 on C. The dominant 7th is special — it contains a hidden tritone (from Module 2) that creates its hunger to move.'},
    {t:'h',x:'Extensions: 9ths, 11ths, 13ths'},
    {t:'p',x:'Keep going past the 7th — stacking still more 3rds — and you reach the <span class="term">extensions</span>: the 9th, 11th, and 13th. They don\'t change a chord\'s basic function; they\'re added spice — the "wider" lush sound of a Stevie Wonder or Steely Dan chord. You rarely play all of them at once; you pick the colors you want.'},
    {t:'note',x:'<b>Why odd numbers?</b> 1, 3, 5, 7, 9, 11, 13 — chords are built in 3rds, so you skip every other scale degree. A 9th is just the 2nd up an octave; an 11th is the 4th; a 13th is the 6th. Same notes you know, lifted into a higher, sweeter register.'},
    {t:'note',k:'phys',x:'<b>The dominant 7th\'s secret.</b> In a C7 chord (C–E–G–B♭), the E and B♭ are a tritone apart — the most unstable interval there is. The ear hears that tension and demands release, which is why a dominant 7th pulls so strongly toward its home chord. Tension is built right into the stack.'},
  ]},
  { id:'m4q', title:'Module 4 Quiz', mins:6, quiz:{ questions:[
    {q:'A major triad is built from the root by stacking…',
     options:['Two minor 3rds','A major 3rd then a minor 3rd','A minor 3rd then a major 3rd','Two major 3rds'], answer:1,
     why:'Major = major 3rd (+4) then minor 3rd (+7 total). Minor flips the order; that one inner note is the whole difference.'},
    {q:'Which triad is built from two stacked minor 3rds (root, +3, +6)?',
     options:['Major','Minor','Diminished','Augmented'], answer:2,
     why:'Diminished = two minor 3rds — tense and unstable, with a tritone between root and top.'},
    {q:'What separates a major triad from a minor triad?',
     options:['The root note','The 5th','Just the middle note (the 3rd), by one half step','The number of notes'], answer:2,
     why:'They share root and 5th; only the 3rd differs by a half step. That single note flips happy to sad.'},
    {q:'A dominant 7th chord (e.g. C7) is restless because it contains…',
     options:['Two perfect 5ths','A hidden tritone','Only consonant intervals','An octave'], answer:1,
     why:'The 3rd and ♭7 form a tritone — maximally unstable, so the chord pulls hard toward resolution.'},
    {q:'A 9th, 11th, or 13th added to a chord is…',
     options:['A completely new root','Added color/extension, built by stacking more 3rds','A rhythm marking','The same as an inversion'], answer:1,
     why:'Extensions keep stacking 3rds (the 2nd, 4th, 6th lifted an octave) for a wider, richer color.'},
    {q:'Listen — major or minor triad?', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.arpThenBlock(buildChord(60,'maj'))),
     options:['Major','Minor'], answer:0, why:'C major triad — bright and resolved.'},
    {q:'Listen — which triad? (Notice the unstable, anxious quality.)', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.arpThenBlock(buildChord(60,'dim'))),
     options:['Major','Minor','Diminished','Augmented'], answer:2,
     why:'Diminished — two minor 3rds give that tense, unresolved sound that wants to move.'},
    {q:'Listen — this lush four-note chord is a…', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.arpThenBlock(buildChord(60,'maj7'))),
     options:['Major triad','Major 7th','Diminished triad','Augmented triad'], answer:1,
     why:'Major 7th (Cmaj7) — that warm, dreamy, slightly jazzy color from the major 7th on top.'},
  ]}},
]},

/* ---------- MODULE 5 ---------- */
{ n:5, track:'Core Track', title:'Diatonic Harmony',
  blurb:'The chords that belong to a key',
  intro:'Build a chord on every note of a scale and you get the family of chords that naturally belong to that key. The Roman-numeral system makes this family portable to any key.',
  lessons:[
  { id:'m5l1', title:'Chords From the Scale', mins:5, blocks:[
    {t:'p',x:'Here\'s where scales and chords meet. Take a major scale and build a triad on <i>each</i> of its seven notes — using only notes from that scale. You get seven chords, and together they are the <span class="term">diatonic</span> chords: the home family of that key.'},
    {t:'p',x:'In C major (all white keys), stacking 3rds on each degree gives: C, Dm, Em, F, G, Am, B°. You didn\'t <i>choose</i> those qualities — and it\'s worth seeing exactly why each one comes out the way it does.'},
    {t:'p',x:'Remember from Module 4 that a triad\'s quality depends on the two 3rds you stack: major-then-minor gives a major triad, minor-then-major gives a minor triad, minor-then-minor gives diminished. Because the scale\'s half steps sit in fixed places (E–F and B–C), each degree ends up with a fixed combination:'},
    {t:'ul',x:[
      '<b>I (C–E–G):</b> C→E is a major 3rd, E→G a minor 3rd → <b>major</b>.',
      '<b>ii (D–F–A):</b> D→F is a minor 3rd (it crosses the E–F half step), F→A a major 3rd → <b>minor</b>.',
      '<b>vii° (B–D–F):</b> B→D minor 3rd, D→F minor 3rd (both cross a half step) → <b>diminished</b> — the odd one out.'
    ]},
    {t:'p',x:'Work through all seven and the qualities fall out mechanically from where those two half steps land. You never memorise individual chords — the pattern <i>is</i> the scale\'s shape, seen through stacked 3rds.'},
    {t:'widget',label:'The chord family of C major',build:()=>diatonicExplorer('major'),
      hint:'Tap each chord, then play all seven up the scale. The pattern of major/minor/diminished is the fingerprint of every major key.'},
    {t:'note',x:'<b>The quality pattern (major key):</b> <b>major, minor, minor, major, major, minor, diminished.</b> Because it comes from the scale\'s fixed shape, it never changes from key to key. Learn it once and you instantly know the chords of any major key — just apply it to that key\'s notes.'},
    {t:'p',x:'Minor keys have their own fixed pattern, derived the same way from the natural-minor shape: minor, diminished, major, minor, minor, major, major. Same logic, different fingerprint — which is why major and minor keys <i>feel</i> structurally different.'},
  ]},
  { id:'m5l2', title:'Roman Numerals', mins:5, blocks:[
    {t:'p',x:'Musicians label these seven chords by their <i>position</i> in the scale using Roman numerals, not by letter name. This is one of the most powerful ideas in theory.'},
    {t:'note',x:'<b style="letter-spacing:1px;color:var(--accent2)">I &nbsp; ii &nbsp; iii &nbsp; IV &nbsp; V &nbsp; vi &nbsp; vii°</b><br>Capitals = major, lowercase = minor, ° = diminished. In any major key, the chord built on the 1st degree is "I", on the 5th degree is "V", and so on.'},
    {t:'p',x:'Why bother? Because it makes keys <b>interchangeable</b>. "I–IV–V" is the same musical idea whether you\'re in C (C–F–G) or in E (E–A–B). The numerals describe the <i>relationships</i> between chords, which is what actually creates the music — the specific letters are just a transposition detail.'},
    {t:'widget',label:'See the numerals in action',build:()=>diatonicExplorer('major'),
      hint:'Each button shows the Roman numeral and the actual C-major chord. The numeral is the portable idea; the letter is just where it lands in this key.'},
    {t:'note',x:'<b>This is the language of the rest of the course.</b> From here on we\'ll talk about progressions as "I–V–vi–IV" rather than naming chords. Once it clicks, you can transpose any song to any key in your head, and you\'ll see the same handful of patterns everywhere.'},
    {t:'note',k:'code',x:'// Procedural lens: diatonic chords = scan the scale,\n// take every 3rd note (degree, degree+2, degree+4).\n// The quality pattern emerges from the scale\'s step sizes\n// — no special-casing needed.'},
    {t:'h',x:'Practice: diatonic chords'},
    {t:'p',x:'This is exactly the recall the quiz expects — the quality of each Roman numeral, and which actual chord a numeral lands on in a given key. It starts with the key-independent pattern (the quality of each numeral) and graduates to naming chords in specific keys. Also in the <b>Practice</b> tab.'},
    {t:'custom',build:()=>skillDrill('diatonic',{intro:'Recall the diatonic quality pattern, then apply it to real keys.'})},
  ]},
  { id:'m5q', title:'Module 5 Quiz', mins:6, quiz:{ questions:[
    {q:'The diatonic chords of a key are…',
     options:['Any chords you like','The chords built on each scale degree using only that scale\'s notes','Only major chords','The same in every key by letter'], answer:1,
     why:'Build a triad on each scale note using only scale notes — that\'s the key\'s home chord family.'},
    {q:'The quality pattern of a MAJOR key is…',
     options:['maj min min maj maj min dim','min maj maj min min maj dim','maj maj maj min min min dim','all major'], answer:0,
     why:'I ii iii IV V vi vii° = major, minor, minor, major, major, minor, diminished. Fixed in every major key.'},
    {q:'In Roman numeral analysis, a lowercase numeral (e.g. "ii") means…',
     options:['A major chord','A minor chord','A diminished chord','The loudest chord'], answer:1,
     why:'Lowercase = minor, uppercase = major, ° = diminished.'},
    {q:'The main advantage of Roman numerals is that they…',
     options:['Sound better','Make progressions portable to any key','Are easier to write','Only work in C'], answer:1,
     why:'I–IV–V is the same idea in every key; numerals capture the relationships, not the specific letters.'},
    {q:'In the key of G major, what chord is "V"?',
     options:['G','C','D','Em'], answer:2,
     why:'The 5th degree of G major is D, so V = D major. (G A B C D…)'},
    {q:'The chord built on the 7th degree of a major scale (vii°) is…',
     options:['Major','Minor','Diminished','Augmented'], answer:2,
     why:'vii° is diminished — the lone diminished triad in the major-key family.'},
    {q:'Listen — these are the 7 diatonic chords of a key, played up the scale. The key is…', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.progression(MAJ_DIATONIC.map((d,i)=>diatonicTriad(60,'major',i)),0.6,0.55)),
     options:['Major','Minor'], answer:0,
     why:'That bright, resolved family climbing up is the major-key set (I ii iii IV V vi vii°).'},
  ]}},
]},

/* ---------- MODULE 6 ---------- */
{ n:6, track:'Core Track', title:'Chord Progressions & Function',
  blurb:'Why chords move — tension and resolution',
  intro:'The heart of harmony. Chords aren\'t random — each has a job (a function), and progressions work by building tension and releasing it. This is why music feels like it\'s going somewhere.',
  lessons:[
  { id:'m6l1', title:'The Three Functions', mins:5, blocks:[
    {t:'p',x:'Every diatonic chord plays one of three roles in the drama of a key. Think of it as a journey: leaving home, traveling, and the pull to return.'},
    {t:'ul',x:[
      '<b>Tonic (home)</b> — I (and vi, iii). Rest, stability, arrival. Where the music wants to end up.',
      '<b>Subdominant (away)</b> — IV (and ii). Motion, departure — we\'ve left home but there\'s no crisis yet.',
      '<b>Dominant (tension)</b> — V (and vii°). Maximum tension, an itch that <i>demands</i> resolution back to the tonic.'
    ]},
    {t:'p',x:'A satisfying progression is a trip through these functions: <b>tonic → subdominant → dominant → tonic</b>. Home, away, tension, home. That arc is underneath an astonishing amount of music.'},
    {t:'h',x:'The pull of V → I'},
    {t:'p',x:'The strongest force in tonal music is the dominant resolving to the tonic — <b>V → I</b>. The V chord contains the <span class="term">leading tone</span> (the 7th scale degree), which sits just a half step below home and aches to slide up to it. Add a 7th (making it V7) and you get a tritone too, doubling the pull.'},
    {t:'widget',label:'Feel the functions',build:()=>progressionPlayer(),
      hint:'Play I–IV–V–I and notice the shape: settled, then moving, then tense, then the relief of coming home. Every other progression here is a variation on that emotional arc.'},
    {t:'note',k:'phys',x:'<b>Why V pulls so hard.</b> In C major, the V chord (G–B–D) contains B — the leading tone, one half step below C. Half-step motion is the strongest melodic pull there is (Module 1). Your ear hears B and wants C the way a held breath wants release.'},
  ]},
  { id:'m6l2', title:'Cadences & Common Progressions', mins:5, blocks:[
    {t:'p',x:'A <span class="term">cadence</span> is how a musical phrase ends — the punctuation of music. Just as sentences end with periods, commas, or cliffhangers, phrases end with different cadences that signal "done", "pause", or "more coming".'},
    {t:'widget',label:'The four cadences',build:()=>cadenceLab(),
      hint:'Authentic (V–I) is a full stop. Plagal (IV–I) is the gentle "Amen". Half (ending on V) is a comma that leaves you hanging. Deceptive (V–vi) fakes the ending — the surprise that keeps a song going.'},
    {t:'h',x:'Progressions that recur everywhere'},
    {t:'p',x:'A handful of progressions show up across pop, rock, jazz, classical and folk — not by copying, but because they trace that tonic–subdominant–dominant arc so cleanly. Learn these and you\'ll recognize the skeleton of thousands of songs.'},
    {t:'widget',label:'The greatest hits',build:()=>progressionPlayer(),
      hint:'I–V–vi–IV alone underlies hundreds of pop songs. ii–V–I is the heartbeat of jazz. Play each and listen for where the tension sits and how it releases.'},
    {t:'note',x:'<b>Why these and not others?</b> Strong progressions move by descending 5ths (V→I, ii→V) or step into the tonic — motions the ear finds inevitable. Weak or "backward" moves (like V→IV) feel like swimming upstream. Function explains <i>why</i> some chord moves feel right and others feel off.'},
    {t:'h',x:'Practice: identify the cadence'},
    {t:'p',x:'Cadences are easiest to learn by ear, because each has a distinct feeling of ending. Start on <b>Learn</b> to hear the four side by side, then test yourself — it begins with just the two most different (authentic vs plagal) and adds the others as you go. Also in the <b>Practice</b> tab.'},
    {t:'custom',build:()=>cadenceEarLadder()},
  ]},
  { id:'m6q', title:'Module 6 Quiz', mins:6, quiz:{ questions:[
    {q:'The three harmonic functions are…',
     options:['Loud, medium, soft','Tonic, subdominant, dominant','Major, minor, diminished','Verse, chorus, bridge'], answer:1,
     why:'Tonic (home), subdominant (away), dominant (tension) — the three roles every chord plays.'},
    {q:'Which chord creates the strongest pull back to the tonic?',
     options:['IV','ii','V','vi'], answer:2,
     why:'V (the dominant) contains the leading tone a half step below home, creating the strongest pull to I.'},
    {q:'An authentic cadence is…',
     options:['IV → I','V → I','I → V','V → vi'], answer:1,
     why:'V → I is the authentic cadence — the strongest, most conclusive "full stop".'},
    {q:'A deceptive cadence (V → vi) works by…',
     options:['Resolving as expected','Setting up the tonic then landing on the minor vi instead','Ending on silence','Going to the subdominant'], answer:1,
     why:'V sets up an expected I, but lands on vi instead — a satisfying surprise that keeps things moving.'},
    {q:'The "leading tone" that gives V its pull is…',
     options:['A whole step above the tonic','A half step below the tonic','The 5th of the scale','The same as the root'], answer:1,
     why:'The leading tone sits a half step below the tonic and aches to resolve up to it.'},
    {q:'The typical tension arc of a progression is…',
     options:['tonic → dominant → subdominant → tonic','tonic → subdominant → dominant → tonic','dominant → tonic → dominant','random'], answer:1,
     why:'Home → away → tension → home. The classic, satisfying journey through the functions.'},
    {q:'Listen — which cadence is this? (A strong, conclusive ending.)', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.progression([diatonicTriad(60,'major',4),diatonicTriad(60,'major',0)],0.95,0.9)),
     options:['Plagal (IV–I)','Authentic (V–I)','Half (I–V)','Deceptive (V–vi)'], answer:1,
     why:'V–I, the authentic cadence — that decisive "we have arrived" sound.'},
    {q:'Listen — this gentle "Amen"-style ending is the…', sub:'Tap play.',
     build:()=>earQ(()=>Audio_.progression([diatonicTriad(60,'major',3),diatonicTriad(60,'major',0)],0.95,0.9)),
     options:['Authentic (V–I)','Plagal (IV–I)','Half (I–V)','Deceptive (V–vi)'], answer:1,
     why:'IV–I, the plagal or "Amen" cadence — softer and gentler than the authentic.'},
  ]}},
]},

/* ---------- MODULE 7 ---------- */
{ n:7, track:'Core Track', title:'Voice Leading & Building Harmony',
  blurb:'Making a progression flow, not lurch',
  intro:'A chord progression is a skeleton. Voice leading is how you connect the chords smoothly — moving each note the shortest distance — so the harmony flows like water instead of jumping around.',
  lessons:[
  { id:'m7l1', title:'Inversions & the Bass Line', mins:5, blocks:[
    {t:'p',x:'A chord\'s notes can be stacked in any order. When a note other than the root sits at the bottom, the chord is in an <span class="term">inversion</span>. The notes are the same — it\'s still a C chord — but the <b>bass note</b> changes its weight and feel.'},
    {t:'widget',label:'Three voicings of one chord',build:()=>inversionDemo(),
      hint:'Root position feels grounded; inversions feel lighter and more mobile. Same chord, different center of gravity.'},
    {t:'p',x:'Inversions exist mostly to serve the <b>bass line</b> — the lowest voice, which is a melody in its own right. By choosing inversions, you can make the bass walk smoothly by step instead of leaping around. A smooth bass line is half of what makes harmony sound professional.'},
    {t:'note',x:'<b>Slash chords.</b> You\'ll see notation like "C/E" — that means a C chord with E in the bass (first inversion). The part after the slash is just which note to put on the bottom. It\'s how musicians write inversions quickly.'},
  ]},
  { id:'m7l2', title:'Smooth Voice Leading', mins:6, blocks:[
    {t:'p',x:'Here\'s the core principle, and it\'s almost a law: <b>when moving from one chord to the next, move each voice as little as possible.</b> Keep common notes where they are, and move the rest by a step. The result is smooth, connected, and singable.'},
    {t:'widget',label:'Same chords, two ways',build:()=>voiceLeadingDemo(),
      hint:'Both play C–G–Am–F. The "jumpy" version slams each chord in root position; the "smooth" version barely moves the inner notes. Same harmony — utterly different polish.'},
    {t:'p',x:'Two practical habits do most of the work: <b>(1) Common-tone retention</b> — if two adjacent chords share a note, keep it in the same voice. <b>(2) Nearest-note motion</b> — move the other voices to the closest available chord tone. Together they minimize total movement.'},
    {t:'h',x:'Adding color tones tastefully'},
    {t:'p',x:'Once the motion is smooth, you can enrich chords with the color tones from Module 4 — 7ths, 9ths, suspensions. A <span class="term">suspension</span> holds a note from the previous chord that clashes slightly, then resolves down by step — a tiny moment of tension and release inside a single chord change. Used sparingly, color tones add sophistication; overused, they turn to mud.'},
    {t:'note',k:'code',x:'// Procedural lens: voice leading is an optimization.\n// For each chord change, assign new-chord notes to voices\n// to MINIMIZE total semitone movement (a min-cost matching).\n// "Good harmony" literally is a distance-minimization problem.'},
  ]},
  { id:'m7q', title:'Module 7 Quiz', mins:5, quiz:{ questions:[
    {q:'A chord inversion is…',
     options:['A different chord','The same chord with a non-root note in the bass','A chord played backwards','A faster chord'], answer:1,
     why:'Same notes, different bass note. C/E is a C chord with E on the bottom.'},
    {q:'The core principle of voice leading is…',
     options:['Move every note as far as possible','Move each voice as little as possible','Always use root position','Play louder'], answer:1,
     why:'Minimal motion — keep common tones, move the rest by the smallest step — makes harmony flow.'},
    {q:'"Common-tone retention" means…',
     options:['Repeating the same chord','Keeping a shared note in the same voice between chords','Removing the 5th','Doubling the root'], answer:1,
     why:'If two chords share a note, hold it in place — that anchor smooths the change.'},
    {q:'Inversions are chosen mainly to…',
     options:['Make chords louder','Create a smooth bass line','Change the key','Add more notes'], answer:1,
     why:'Inversions let the bass move by step instead of leaping — a smooth bass line sounds professional.'},
    {q:'A suspension is…',
